    const eur = card.priceEur !== undefined ? card.priceEur : (card.foilOnly ? null : card.price);
    const foilP = card.priceFoil !== undefined ? card.priceFoil : (card.foilOnly ? card.price : null);
    const priceRow = (label, v) => (v !== null && v !== undefined)
      ? '<div><span class="lbl">' + label + ':</span> ' + formatEur(v) + "</div>" : "";
    d.innerHTML =
      '<img class="detail-img" src="' + card.image + '" alt="' + escapeHtml(card.name) + '">' +
      '<div class="detail-head"><h3>' + escapeHtml(card.name) + "</h3>" +
        '<button class="fav-btn' + (faved ? " faved" : "") + '" aria-pressed="' + faved +
          '" aria-label="Als Favorit markieren">' + (faved ? "★" : "☆") + "</button></div>" +
      '<div class="detail-meta">' + card.set.toUpperCase() + " #" + card.number +
        ' · <span class="rarity-' + (RARITY_LABEL[card.rarity] || "C") + '">' +
        (RARITY_NAME[card.rarity] || card.rarity) + "</span>" +
        (card.foil ? ' · <span class="foil">Foil</span>' : "") +
        ((card.qty || 1) > 1 ? " · " + card.qty + "× im Besitz" : "") + "</div>" +
      (card.typeLine ? '<div class="detail-type">' + escapeHtml(card.typeLine) + "</div>" : "") +
      (card.oracle ? '<div class="detail-oracle">' + escapeHtml(card.oracle).replace(/\n/g, "<br>") + "</div>" : "") +
      (card.flavor ? '<div class="detail-flavor">' + escapeHtml(card.flavor).replace(/\n/g, "<br>") + "</div>" : "") +
      '<div class="detail-prices">' +
        (card.price !== null
          ? '<div class="now">' + (card.isCm ? "ab " : "") + formatEur(card.price) +
            (card.priceIsFoil ? " <small>(Foil)</small>" : "") + "</div>"
          : '<div class="now unknown">kein Preis verfügbar</div>') +
        priceRow("Normal", eur) + priceRow("Foil", foilP) + priceRow("Trend", card.trend) +
      "</div>" +
      '<div class="detail-links">' +
        '<a class="btn" href="' + card.url + '" target="_blank" rel="noopener">Scryfall ↗</a>' +
        (card.cmUrl ? '<a class="btn" href="' + card.cmUrl + '" target="_blank" rel="noopener">Cardmarket ↗</a>' : "") +
      "</div>";
    document.getElementById("detail-sheet-title").textContent = card.name;
    d.querySelector(".fav-btn").addEventListener("click", () => {
      const el = cardEls.get(uidOf(card));
      if (el) el.toggleFav(); // hält Kachel + Favoriten-Set synchron
      renderCardDetail(card);
    });
  }

  // ---- Komponente: eine einzelne Kartenkachel ----
  // Das Element ist selbst die Grid-Kachel (Klasse "card"), kapselt sein
  // Rendering und die Favoriten-Interaktion und bietet kleine Methoden,
  // mit denen der Controller Preis, Sichtbarkeit und Reihenfolge steuert,
  // ohne die <img>-Elemente neu zu erzeugen.
  class MtgCard extends HTMLElement {
    set card(data) { this._card = data; if (this.isConnected) this.render(); }
    get card() { return this._card; }

    connectedCallback() {
      if (!this._rendered) this.render();
    }

    render() {
      const card = this._card;
      if (!card) return;
      const faved = favorites.has(uidOf(card));
      this.classList.add("card");
      // Klick irgendwo auf der Kachel (außer Stern/Links) öffnet die Details;
      // fürs Keyboard ist der Bildbereich ein echter <button> (nichts
      // Interaktives darf darin verschachtelt sein).
      if (!this._wired) {
        this._wired = true;
        this.addEventListener("click", e => {
          if (e.target.closest(".fav-btn, .cm-link, a")) return;
          this.dispatchEvent(new CustomEvent("card-open", { bubbles: true, detail: this._card }));
        });
      }
      this.innerHTML =
        '<button class="img-link" aria-label="Details zu ' + card.name.replace(/"/g, "&quot;") + '">' +
          '<img loading="lazy" decoding="async"' +
          ' src="' + card.image + '"' +
          (card.imageSmall ? ' srcset="' + card.imageSmall + ' 146w, ' + card.image + ' 488w" sizes="(max-width: 600px) 45vw, 240px"' : "") +
          ' alt="' + card.name.replace(/"/g, "&quot;") + '">' +
        "</button>" +
        (card.compare
          ? '<div class="cmp-badge ' + card.compare.state + '">' + cmpBadgeLabel(card.compare) + "</div>"
          : (card.qty > 1 ? '<div class="qty-badge">' + card.qty + "×</div>" : "")) +
        '<div class="info">' +
          '<div class="name-row">' +
            '<div class="name">' + card.name + "</div>" +
            '<button class="fav-btn' + (faved ? " faved" : "") +
              '" title="Als Favorit markieren" aria-label="Als Favorit markieren" aria-pressed="' +
              faved + '">' +
              (faved ? "★" : "☆") +
            "</button>" +
          "</div>" +
          '<div class="meta">' + card.set.toUpperCase() + " #" + card.number +
            ' · <span class="rarity-' + (RARITY_LABEL[card.rarity] || "C") + '">' +
            (RARITY_NAME[card.rarity] || card.rarity) + "</span>" +
            (card.foil ? ' · <span class="foil">Foil</span>' : "") + "</div>" +
          '<div class="price-line">' + priceHtml(card) + "</div>" +
        "</div>";
      this.querySelector(".fav-btn").addEventListener("click", () => this.toggleFav());
      this._rendered = true;
    }

    toggleFav() {
      const uid = uidOf(this._card);
      const btn = this.querySelector(".fav-btn");
      if (favorites.has(uid)) {
        favorites.delete(uid);
        btn.classList.remove("faved");
        btn.textContent = "☆";
        btn.setAttribute("aria-pressed", "false");
      } else {
        favorites.add(uid);
        btn.classList.add("faved");
        btn.textContent = "★";
        btn.setAttribute("aria-pressed", "true");
      }
      saveFavorites();
      applyFilters();
    }

    refreshPrice() {
      const line = this.querySelector(".price-line");
      if (line) line.innerHTML = priceHtml(this._card);
    }

    // Mengen-Badge überschreiben (Gruppierung) bzw. mit null zurücksetzen
    updateQtyBadge(text) {
      const card = this._card;
      if (!card || card.compare) return;
      const def = (card.qty || 1) > 1 ? card.qty + "×" : "";
      const t = text != null ? text : def;
      let badge = this.querySelector(".qty-badge");
      if (!t) { if (badge) badge.remove(); return; }
      if (!badge) {
        badge = document.createElement("div");
        badge.className = "qty-badge";
        this.querySelector(".img-link").after(badge);
      }
      badge.textContent = t;
    }

    setFiltered(hidden) { this.classList.toggle("filtered-out", hidden); }
    setOrder(n) { this.style.order = n; }
  }
  customElements.define("mtg-card", MtgCard);

  function buildCardEl(card) {
    const el = document.createElement("mtg-card");
    el.card = card;
    return el;
  }

  // ---- Komponente: Zeile mit aktiven Filter-Chips ----
  // Bekommt vom Controller die Chip-Liste; jeder Chip entfernt beim Tippen
  // seinen Filter. Versteckt sich selbst, wenn keine Filter aktiv sind.
  class MtgFilterChips extends HTMLElement {
    connectedCallback() { this.classList.add("chips-row"); }

    render(chips, onClearAll) {
      this.replaceChildren();
      this.hidden = chips.length === 0;
      for (const chip of chips) {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.innerHTML = escapeHtml(chip.label) + ' <span class="x" aria-hidden="true">✕</span>';
        btn.setAttribute("aria-label", "Filter entfernen: " + chip.label);
        btn.addEventListener("click", chip.remove);
        this.appendChild(btn);
      }
      if (chips.length) {
        const clear = document.createElement("button");
        clear.className = "chip clear";
        clear.textContent = "Alle löschen";
        clear.addEventListener("click", onClearAll);
        this.appendChild(clear);
      }
    }
  }
  customElements.define("mtg-filter-chips", MtgFilterChips);

  function matchesColorFilter(card) {
    if (filters.colors.size === 0) return true;
    const isMulti = card.colors.length > 1;
    const isColorless = card.colors.length === 0;
    for (const c of filters.colors) {
      if (c === "M" && isMulti) return true;
      if (c === "C" && isColorless) return true;
      if (card.colors.includes(c)) return true;
    }
    return false;
  }

  function matchesFilters(card) {
    if (compareMode && filters.compareFilter !== "all" &&
        card.compare && card.compare.state !== filters.compareFilter) return false;
    if (!matchesColorFilter(card)) return false;
    if (filters.favsOnly && !favorites.has(uidOf(card))) return false;
    if (filters.search && !searchTextOf(card).includes(filters.search)) return false;
    if (filters.priceMin !== null && (card.price === null || card.price < filters.priceMin)) return false;
    if (filters.priceMax !== null && (card.price === null || card.price > filters.priceMax)) return false;
    return true;
  }

  function sortedCards() {
    const list = [...cards];
    const noPrice = v => v.price === null;
    switch (filters.sort) {
      case "price-asc":
        list.sort((a, b) => noPrice(a) - noPrice(b) || (a.price ?? 0) - (b.price ?? 0) || a.numSort - b.numSort);
        break;
      case "price-desc":
        list.sort((a, b) => noPrice(a) - noPrice(b) || (b.price ?? 0) - (a.price ?? 0) || a.numSort - b.numSort);
        break;
      case "name":
        list.sort((a, b) => a.name.localeCompare(b.name, "de") || a.numSort - b.numSort);
        break;
      default:
        list.sort((a, b) => a.set.localeCompare(b.set) || a.numSort - b.numSort);
    }
    return list;
  }

  function updateStatus(visibleQty, totalQty, totalValue) {
    let text = visibleQty + " von " + totalQty + " Karten";
    if (totalValue > 0 && !compareMode) text += " · Wert: " + formatEur(totalValue);
    text += " · " + favorites.size + " Favoriten";
    if (cmInfo) {
      text += " · Cardmarket-Preise: Stand " + new Date(cmInfo.updatedAt).toLocaleDateString("de-DE");
    } else {
      text += " · Preise: Scryfall (Cardmarket-Trend)";
    }
    statusBar.textContent = text;
  }

  // Sichtbarkeit & Reihenfolge per CSS steuern statt das DOM neu zu bauen –
  // so werden die <img>-Elemente nie neu erzeugt.
  function applyFilters() {
    // Im Vergleichsmodus sind die Drucke bereits über den Namen gebündelt
    const grouping = groupPrints && !compareMode;
    let visibleTiles = 0;
    let value = 0;
    let visibleQty = 0;
    let totalQty = 0;
    const groups = new Map(); // normName -> { el: Repräsentant, qty, prints }
    for (const [i, card] of sortedCards().entries()) {
      const el = cardEls.get(uidOf(card));
      if (!el) continue;
      const qty = card.qty || 1;
      totalQty += qty;
      const pass = matchesFilters(card);
      let show = pass;
      if (pass) {
        visibleQty += qty;
        if (card.price !== null) value += card.price * qty;
        if (grouping) {
          const key = normName(card.name);
          const g = groups.get(key);
          // Erster passender Druck (in Sortierreihenfolge) vertritt die Gruppe
          if (g) { g.qty += qty; g.prints++; show = false; }
          else groups.set(key, { el: el, qty: qty, prints: 1 });
        }
      }
      el.setFiltered(!show);
      el.setOrder(i);
      if (show) visibleTiles++;
    }
    if (grouping) {
      for (const g of groups.values()) {
        g.el.updateQtyBadge(g.prints > 1 ? g.qty + "× · " + g.prints + " Prints" : null);
      }
    } else {
      for (const el of cardEls.values()) el.updateQtyBadge(null);
    }
    // Ohne Collection bleibt der Hinweis mit CTA sichtbar
    emptyNote.hidden = visibleTiles > 0 || (cards.length === 0 && !!currentCollection());
    updateStatus(visibleQty, totalQty, value);
    updateFilterSummary(visibleQty, totalQty);
    renderFilterChips();
  }

  function activeFilterCount() {
    return filters.colors.size +
      (filters.priceMin !== null ? 1 : 0) +
      (filters.priceMax !== null ? 1 : 0) +
      (filters.search ? 1 : 0) +
      (filters.favsOnly ? 1 : 0) +
      (filters.sort !== "number" ? 1 : 0);
  }

  // Zähler auf Filter-Leiste und Sheet-Button aktuell halten
  function updateFilterSummary(visibleQty, totalQty) {
    const n = activeFilterCount();
    document.getElementById("filter-toggle-label").textContent =
      "⚙ Filter & Sortieren" + (n ? " (" + n + ")" : "");
    document.getElementById("filter-toggle-count").textContent =
      totalQty ? visibleQty + " / " + totalQty + " Karten" : "";
    document.getElementById("filter-sheet-apply").textContent =
      "Zeige " + visibleQty + " Karten";
  }

  // Aktive Filter als entfernbare Chips (mobil; Desktop zeigt die Sidebar)
  const COLOR_NAME = { W: "Weiß", U: "Blau", B: "Schwarz", R: "Rot", G: "Grün", M: "Mehrfarbig", C: "Farblos" };
  const SORT_CHIP = { "price-desc": "Preis absteigend", "price-asc": "Preis aufsteigend", "name": "Name A–Z" };
  function renderFilterChips() {
    const chips = [];
    for (const c of filters.colors) {
      chips.push({
        label: COLOR_NAME[c] || c,
        remove: () => document.querySelector('.color-btn[data-color="' + c + '"]').click()
      });
    }
    if (filters.priceMin !== null) chips.push({
      label: "ab " + formatEur(filters.priceMin),
      remove: () => { filters.priceMin = null; document.getElementById("price-min").value = ""; applyFilters(); }
    });
    if (filters.priceMax !== null) chips.push({
      label: "bis " + formatEur(filters.priceMax),
      remove: () => { filters.priceMax = null; document.getElementById("price-max").value = ""; applyFilters(); }
    });
    if (filters.search) chips.push({
      label: "„" + filters.search + "“",
      remove: () => { filters.search = ""; document.getElementById("search").value = ""; applyFilters(); }
    });
    if (filters.favsOnly) chips.push({
      label: "★ Favoriten",
      remove: () => document.getElementById("fav-filter").click()
    });
    if (filters.sort !== "number") chips.push({
      label: SORT_CHIP[filters.sort] || filters.sort,
      remove: () => { filters.sort = "number"; document.getElementById("sort").value = "number"; applyFilters(); }
    });
    document.querySelector("mtg-filter-chips").render(chips, resetFilters);
  }

  function addBatch(batch, token) {
    if (token !== loadToken) return;
    const frag = document.createDocumentFragment();
    for (const card of batch) {
      const uid = uidOf(card);
      if (cardEls.has(uid)) continue;
      cards.push(card);
      finalizePrice(card);
      if (pendingCmPrices) applyCardmarketPrice(card, pendingCmPrices);
      const el = buildCardEl(card);
      cardEls.set(uid, el);
      frag.appendChild(el);
    }
    grid.appendChild(frag);
    applyFilters();
  }

  // ===== Steuerelemente verdrahten =====
  // Responsive Platzierung: die Filter-Gruppen wandern zwischen Sidebar
  // (Desktop) und Bottom-Sheet (mobil). Es sind dieselben DOM-Elemente,
  // alle Event-Listener bleiben dabei erhalten.
  const filterPanel = document.getElementById("controls");
  const filterGroupsEl = document.querySelector(".filter-groups");
  const filterSheet = document.getElementById("filter-sheet");
  const filterSheetBody = document.getElementById("filter-sheet-body");
  const desktopLayout = matchMedia("(min-width: 1024px)");
  function placeFilterGroups() {
    if (desktopLayout.matches) {
      if (filterSheet.open) filterSheet.close();
      if (filterGroupsEl.parentElement !== filterPanel) filterPanel.appendChild(filterGroupsEl);
    } else if (filterGroupsEl.parentElement !== filterSheetBody) {
      filterSheetBody.appendChild(filterGroupsEl);
    }
  }
  desktopLayout.addEventListener("change", placeFilterGroups);
  placeFilterGroups();
  localStorage.removeItem("mtg-filters-open-v1"); // obsolet seit Sidebar/Sheet

  document.getElementById("filter-toggle").addEventListener("click", () => filterSheet.showModal());
  document.getElementById("filter-sheet-close").addEventListener("click", () => filterSheet.close());
  document.getElementById("filter-sheet-apply").addEventListener("click", () => filterSheet.close());
  // Tipp auf den Scrim schließt das Sheet (Klickziel ist dann der <dialog> selbst)
  filterSheet.addEventListener("click", e => { if (e.target === filterSheet) filterSheet.close(); });

  // Detail-Ansicht: gleiche Wander-Logik wie die Filter-Gruppen
  const detailPanel = document.getElementById("detail-panel");
  const detailSheet = document.getElementById("detail-sheet");
  const detailSheetBody = document.getElementById("detail-sheet-body");
  const cardDetailEl = document.getElementById("card-detail");
  function placeCardDetail() {
    if (desktopLayout.matches) {
      if (detailSheet.open) detailSheet.close();
      if (cardDetailEl.parentElement !== detailPanel) detailPanel.appendChild(cardDetailEl);
    } else {
      detailPanel.hidden = true;
      if (cardDetailEl.parentElement !== detailSheetBody) detailSheetBody.appendChild(cardDetailEl);
    }
  }
  function openCardDetail(card) {
    renderCardDetail(card);
    if (desktopLayout.matches) detailPanel.hidden = false;
    else if (!detailSheet.open) detailSheet.showModal();
  }
  function closeCardDetail() {
    detailPanel.hidden = true;
    if (detailSheet.open) detailSheet.close();
  }
  desktopLayout.addEventListener("change", placeCardDetail);
  placeCardDetail();
  grid.addEventListener("card-open", e => openCardDetail(e.detail));
  document.getElementById("detail-close").addEventListener("click", closeCardDetail);
  document.getElementById("detail-sheet-close").addEventListener("click", () => detailSheet.close());
  detailSheet.addEventListener("click", e => { if (e.target === detailSheet) detailSheet.close(); });

  document.querySelectorAll(".color-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const c = btn.dataset.color;
      if (filters.colors.has(c)) { filters.colors.delete(c); btn.classList.remove("active"); }
      else { filters.colors.add(c); btn.classList.add("active"); }
      applyFilters();
    });
  });
  document.getElementById("price-min").addEventListener("input", e => {
    filters.priceMin = e.target.value === "" ? null : parseFloat(e.target.value);
    applyFilters();
  });
  document.getElementById("price-max").addEventListener("input", e => {
    filters.priceMax = e.target.value === "" ? null : parseFloat(e.target.value);
    applyFilters();
  });
  document.getElementById("sort").addEventListener("change", e => {
    filters.sort = e.target.value;
    applyFilters();
  });
  let searchTimer = null;
  document.getElementById("search").addEventListener("input", e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      filters.search = normName(e.target.value);
      applyFilters();
    }, 150);
  });
  document.getElementById("fav-filter").addEventListener("click", e => {
    filters.favsOnly = !filters.favsOnly;
    e.currentTarget.classList.toggle("active", filters.favsOnly);
    applyFilters();
  });
  function resetFilters() {
    filters.colors.clear();
    filters.priceMin = filters.priceMax = null;
    filters.sort = "number";
    filters.search = "";
    filters.favsOnly = false;
    document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("price-min").value = "";
    document.getElementById("price-max").value = "";
    document.getElementById("sort").value = "number";
    document.getElementById("search").value = "";
    document.getElementById("fav-filter").classList.remove("active");
    applyFilters();
  }
  document.getElementById("reset").addEventListener("click", resetFilters);

  let view = localStorage.getItem(VIEW_KEY) === "gallery" ? "gallery" : "detail";
  function applyView() {
    grid.classList.toggle("gallery", view === "gallery");
    document.getElementById("view-detail").classList.toggle("active", view === "detail");
    document.getElementById("view-gallery").classList.toggle("active", view === "gallery");
  }
  document.getElementById("view-detail").addEventListener("click", () => {
    view = "detail";
    localStorage.setItem(VIEW_KEY, view);
    applyView();
  });
  document.getElementById("view-gallery").addEventListener("click", () => {
    view = "gallery";
    localStorage.setItem(VIEW_KEY, view);
    applyView();
  });

  // Prints-bündeln-Toggle (rein visuell, Daten bleiben je Print getrennt)
  let groupPrints = localStorage.getItem(GROUP_KEY) === "1";
  const groupBtn = document.getElementById("group-toggle");
  groupBtn.classList.toggle("active", groupPrints);
  groupBtn.addEventListener("click", () => {
    groupPrints = !groupPrints;
    localStorage.setItem(GROUP_KEY, groupPrints ? "1" : "0");
    groupBtn.classList.toggle("active", groupPrints);
    applyFilters();
  });

  colSelect.addEventListener("change", e => { if (e.target.value) switchCollection(e.target.value); });
  document.getElementById("col-new").addEventListener("click", () => openModal("create"));
  document.getElementById("col-add").addEventListener("click", () => {
    if (currentCollection()) openModal("add");
  });
  document.getElementById("col-cancel").addEventListener("click", closeModal);
  document.getElementById("col-create").addEventListener("click", handleModalSubmit);
  document.getElementById("col-delete").addEventListener("click", () => { closeMoreMenu(); deleteCurrentCollection(); });
  document.getElementById("col-rename").addEventListener("click", () => { closeMoreMenu(); renameCurrentCollection(); });
  document.getElementById("col-live").addEventListener("click", () => { closeMoreMenu(); shareLiveCollection(); });
  document.getElementById("col-live-stop").addEventListener("click", () => { closeMoreMenu(); stopLiveShare(); });
  document.getElementById("col-export").addEventListener("click", () => { closeMoreMenu(); exportCurrentCollection(); });
  document.getElementById("col-import-btn").addEventListener("click", () => {
    closeMoreMenu();
    document.getElementById("col-import").click();
  });
  document.getElementById("col-import").addEventListener("change", e => {
    if (e.target.files[0]) importCollectionFile(e.target.files[0]);
    e.target.value = "";
  });

  // ⋯-Menü
  const moreBtn = document.getElementById("col-more");
  const moreMenu = document.getElementById("more-menu");
  function closeMoreMenu() {
    moreMenu.hidden = true;
    moreBtn.setAttribute("aria-expanded", "false");
  }
  moreBtn.addEventListener("click", e => {
    e.stopPropagation();
    moreMenu.hidden = !moreMenu.hidden;
    moreBtn.setAttribute("aria-expanded", String(!moreMenu.hidden));
  });
  document.addEventListener("click", e => {
    if (!moreMenu.hidden && !moreMenu.contains(e.target) && e.target !== moreBtn) closeMoreMenu();
  });

  // Vergleich
  document.getElementById("col-compare").addEventListener("click", openCompareDialog);
  document.getElementById("compare-cancel").addEventListener("click", () => { compareOverlay.hidden = true; });
  document.getElementById("compare-start").addEventListener("click", () => {
    const v = document.getElementById("compare-select").value;
    if (v) startCompare(v);
  });
  document.getElementById("compare-exit").addEventListener("click", () => switchCollection(activeId));
  document.getElementById("share-adopt").addEventListener("click", adoptSharedCollection);
  document.getElementById("share-close").addEventListener("click", () => switchCollection(activeId));
  document.querySelectorAll(".cmp-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      filters.compareFilter = chip.dataset.cmp;
      document.querySelectorAll(".cmp-chip").forEach(c => c.classList.toggle("active", c === chip));
      applyFilters();
    });
  });
  compareOverlay.addEventListener("click", e => { if (e.target === compareOverlay) compareOverlay.hidden = true; });

  modalOverlay.addEventListener("click", e => { if (e.target === modalOverlay) closeModal(); });
  document.addEventListener("keydown", e => {
    if (e.key !== "Escape") return;
    if (!modalOverlay.hidden) closeModal();
    if (!compareOverlay.hidden) compareOverlay.hidden = true;
    if (!detailPanel.hidden) closeCardDetail();
    closeMoreMenu();
  });

  // Pinch-to-Zoom unterbinden. iOS Safari ignoriert user-scalable=no,
  // reagiert aber auf gesturestart/touchmove mit scale.
  document.addEventListener("gesturestart", e => e.preventDefault());
  document.addEventListener("touchmove", e => {
    if (e.scale !== undefined && e.scale !== 1) e.preventDefault();
  }, { passive: false });

  // Zurück-nach-oben-Button
  const toTop = document.getElementById("to-top");
  window.addEventListener("scroll", () => { toTop.hidden = window.scrollY < 600; }, { passive: true });
  toTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

  // ===== Start =====
  applyView();
  renderCollectionSelect();
  loadCardmarketPrices();
  openLiveFromHash().then(handled => {
    if (!handled) switchCollection(activeId);
  });
})();
</script>
</body>
</html>
