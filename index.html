<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MTG Collections</title>
<style>
  :root {
    --bg: #101418;
    --panel: #1a2128;
    --panel-2: #222b34;
    --text: #e8edf2;
    --muted: #93a1ad;
    --accent: #4cc964;
    --accent-2: #2e8b57;
    --gold: #f2c14e;
    --border: #2e3a44;
    /* Design-Tokens für Bedienelemente – neue Controls nutzen diese Werte */
    --radius: 8px;
    --btn-pad: 7px 12px;
  }
  * { box-sizing: border-box; }
  html, body {
    overflow-x: hidden;
    overflow-x: clip;
    overscroll-behavior-x: none;
    /* Blockiert Doppeltipp-Zoom, Scrollen/Pannen bleibt erlaubt */
    touch-action: pan-x pan-y;
  }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* Layout-Komponenten sind transparente Wrapper: ihre Vorlagen bringen
     dieselben Klassen/IDs mit wie zuvor, das Styling bleibt unverändert. */
  mtg-app-header, mtg-collection-bar, mtg-filter-controls, mtg-status-bar,
  mtg-compare-bar, mtg-share-bar, mtg-progress-bar, mtg-filter-bar,
  mtg-filter-sheet, mtg-detail-panel, mtg-detail-sheet,
  mtg-collection-modal, mtg-compare-modal, mtg-to-top { display: contents; }

  header {
    padding: 14px 16px 0;
    text-align: center;
  }
  header h1 {
    margin: 0;
    font-size: 1.35rem;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  header h1 span { color: var(--accent); }

  .collection-bar {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 640px;
    margin: 0 auto;
    padding: 14px 24px 0;
  }
  .collection-bar select { width: 100%; }
  .collection-actions {
    display: flex;
    gap: 8px;
  }
  .collection-actions > .btn { flex: 1; }
  .more-wrap { flex: 0 0 auto; }
  .more-wrap > .btn { width: 100%; min-width: 48px; height: 100%; }
  /* Basisklasse aller Schaltflächen. Zustände über Modifikatoren:
     .primary (Hauptaktion), .active (gewählt, Akzentfarbe),
     .gold.active (gewählt, Gold – z. B. Favoriten-Filter) */
  .btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: var(--btn-pad);
    font-size: 0.9rem;
    cursor: pointer;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { border-color: var(--accent-2); color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:disabled:hover { border-color: var(--border); }
  .btn.active {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 8px rgba(76,201,100,0.3);
  }
  .btn.gold.active {
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 8px rgba(242,193,78,0.35);
  }

  .more-wrap { position: relative; }
  .more-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    min-width: 200px;
    z-index: 30;
    overflow: hidden;
  }
  .more-menu[hidden] { display: none; }
  .more-menu button {
    background: none;
    border: none;
    color: var(--text);
    text-align: left;
    padding: 11px 14px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .more-menu button:hover { background: var(--panel-2); }
  .more-menu button:disabled { opacity: 0.4; cursor: not-allowed; }
  .more-menu button.danger { color: #e8838f; }

  .compare-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: center;
    padding: 10px 24px;
    background: var(--panel-2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .compare-bar[hidden] { display: none; }
  .compare-bar .cmp-title { font-size: 0.88rem; }
  .compare-bar .cmp-title strong { color: var(--accent); }
  .cmp-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .cmp-chip {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 0.82rem;
    cursor: pointer;
  }
  .cmp-chip.active { border-color: var(--accent); color: var(--accent); }

  .cmp-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    max-width: calc(100% - 16px);
    border-radius: var(--radius);
    padding: 3px 8px;
    font-size: 0.78rem;
    font-weight: 700;
    line-height: 1.3;
    background: rgba(10,13,16,0.82);
  }
  .cmp-badge.both { border: 1px solid var(--accent); color: var(--accent); }
  .cmp-badge.onlyA { border: 1px solid #7db8e8; color: #7db8e8; }
  .cmp-badge.onlyB { border: 1px solid #e8a87c; color: #e8a87c; }

  .to-top {
    position: fixed;
    bottom: 18px;
    right: 18px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 1.2rem;
    cursor: pointer;
    z-index: 50;
    box-shadow: 0 4px 14px rgba(0,0,0,0.45);
  }
  .to-top:hover { border-color: var(--accent); color: var(--accent); }

  .modal-small { max-width: 420px; }

  /* Touch-Geräte/Mobil & Tablet: 44px-Touch-Ziele (Apple HIG / WCAG 2.5.5),
     16px-Inputs gegen iOS-Auto-Zoom, Platz für die fixe Filter-Leiste */
  @media (max-width: 1023.98px) {
    input[type="number"], input[type="search"], input[type="text"], select, textarea {
      font-size: 16px;
    }
    .color-btn { width: 44px; height: 44px; }
    .btn, .cmp-chip { min-height: 44px; }
    .grid { padding: 8px 12px calc(84px + env(safe-area-inset-bottom, 0px)); gap: 12px; }
    .empty-note { padding-bottom: 110px; }
    .to-top { bottom: calc(76px + env(safe-area-inset-bottom, 0px)); }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  /* ===== Responsive App-Layout =====
     Desktop (≥1024px): persistente Filter-Sidebar links neben dem Inhalt.
     Mobil/Tablet: Sidebar versteckt; die Filter-Gruppen wandern per JS in
     das Bottom-Sheet, geöffnet über die fixe Leiste in der Daumen-Zone. */
  .app-layout { display: block; }
  .content { min-width: 0; }
  .filter-panel { display: none; }
  @media (min-width: 1024px) {
    .app-layout {
      display: grid;
      /* Sidebar | Inhalt | Detail-Panel (kollabiert, solange [hidden]) */
      grid-template-columns: 264px minmax(0, 1fr) auto;
    }
    .filter-panel {
      display: block;
      position: sticky;
      top: 0;
      align-self: start;
      max-height: 100dvh;
      overflow-y: auto;
      padding: 18px 16px 28px;
      background: var(--panel);
      border-right: 1px solid var(--border);
    }
  }
  .filter-groups {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .filter-groups input[type="search"],
  .filter-groups select { width: 100%; }
  .filter-groups input[type="number"] { flex: 1; min-width: 0; width: 90px; }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .control-group .label {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }
  .control-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* Fixe Filter-Leiste (nur mobil/Tablet) – sitzt in der Daumen-Zone */
  .filter-bar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 40;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
    background: rgba(26, 33, 40, 0.92);
    backdrop-filter: blur(8px);
    border-top: 1px solid var(--border);
  }
  .filter-bar .btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    min-height: 44px;
  }
  .filter-bar .bar-count { color: var(--muted); font-size: 0.84rem; }
  @media (min-width: 1024px) {
    .filter-bar { display: none; }
  }

  /* Bottom-Sheet (natives <dialog>): Grid bleibt hinter dem Scrim sichtbar */
  dialog.sheet {
    width: 100%;
    max-width: 640px;
    margin: auto auto 0;
    padding: 0;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    background: var(--panel);
    color: var(--text);
    max-height: 85dvh;
    display: flex;
    flex-direction: column;
  }
  dialog.sheet:not([open]) { display: none; }
  dialog.sheet::backdrop { background: rgba(6, 9, 12, 0.45); }
  body:has(dialog.sheet[open]) { overflow: hidden; }
  .sheet-header {
    position: relative;
    padding: 18px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .sheet-header h2 { margin: 0; font-size: 1rem; }
  .sheet-header .grabber {
    position: absolute;
    top: 6px;
    left: 50%;
    translate: -50% 0;
    width: 36px;
    height: 4px;
    border-radius: 999px;
    background: var(--border);
  }
  .sheet-close {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 44px;
    height: 44px;
    border: none;
    background: none;
    color: var(--muted);
    font-size: 1.05rem;
    cursor: pointer;
    border-radius: var(--radius);
  }
  .sheet-close:hover { color: var(--text); }
  .sheet-body {
    overflow-y: auto;
    padding: 16px;
    flex: 1;
  }
  .sheet-footer {
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid var(--border);
  }
  .sheet-footer .btn { width: 100%; min-height: 46px; }

  /* Aktive Filter als entfernbare Chips über dem Grid (nur mobil/Tablet) */
  .chips-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 16px 10px;
    scrollbar-width: none;
  }
  .chips-row::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--panel-2);
    border: 1px solid var(--accent-2);
    color: var(--accent);
    border-radius: 999px;
    padding: 6px 13px;
    font-size: 0.82rem;
    min-height: 38px;
    cursor: pointer;
  }
  .chip .x { color: var(--muted); }
  .chip:hover .x { color: var(--text); }
  .chip.clear { border-color: var(--border); color: var(--muted); }
  .chips-row[hidden] { display: none; }
  @media (min-width: 1024px) {
    mtg-filter-chips { display: none; }
  }

  /* Detail-on-Demand: Master-Detail-Panel (Desktop) bzw. Bottom-Sheet (mobil).
     Der Inhalt #card-detail wandert per JS zwischen beiden Hosts. */
  .detail-panel {
    position: sticky;
    top: 0;
    align-self: start;
    width: 340px;
    max-height: 100dvh;
    overflow-y: auto;
    background: var(--panel);
    border-left: 1px solid var(--border);
    padding: 16px 16px 24px;
  }
  .detail-panel .sheet-close { position: absolute; top: 6px; right: 6px; z-index: 1; }
  @media (max-width: 1023.98px) {
    .detail-panel { display: none !important; }
  }
  .card-detail .detail-img {
    width: 100%;
    aspect-ratio: 488 / 680;
    object-fit: cover;
    border-radius: 10px;
    background: #0a0d10;
  }
  .detail-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .detail-head h3 { margin: 12px 0 0; font-size: 1.05rem; line-height: 1.3; }
  .detail-head .fav-btn { font-size: 1.4rem; margin-top: 10px; }
  .detail-meta { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
  .detail-meta .foil { color: var(--gold); }
  .detail-type { margin-top: 10px; font-size: 0.87rem; font-weight: 600; }
  .detail-oracle { margin-top: 8px; font-size: 0.85rem; line-height: 1.55; }
  .detail-flavor {
    margin-top: 8px;
    font-size: 0.82rem;
    color: var(--muted);
    font-style: italic;
    line-height: 1.5;
  }
  .detail-prices {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 0.85rem;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .detail-prices .now { font-size: 1.05rem; font-weight: 700; color: var(--accent); }
  .detail-prices .now.unknown { color: var(--muted); font-weight: 400; }
  .detail-prices .now small { color: var(--muted); font-weight: 400; }
  .detail-prices .lbl { color: var(--muted); }
  .detail-links { margin-top: 14px; display: flex; gap: 8px; }
  .detail-links .btn {
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
  .color-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    font-weight: 700;
    font-size: 0.85rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--panel-2);
    color: var(--text);
    transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
  }
  .color-btn:hover { transform: scale(1.1); }
  .color-btn.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.45); }
  .color-btn[data-color="W"] { background: #f8f6d8; color: #4a4636; }
  .color-btn[data-color="U"] { background: #aae0fa; color: #0d4f8b; }
  .color-btn[data-color="B"] { background: #444049; color: #cbc2bf; }
  .color-btn[data-color="R"] { background: #f9aa8f; color: #8b2f1d; }
  .color-btn[data-color="G"] { background: #9bd3ae; color: #1c5734; }
  .color-btn[data-color="M"] { background: linear-gradient(135deg, #f2c14e, #c98a2e); color: #4d3505; }
  .color-btn[data-color="C"] { background: #c7c1b8; color: #4a463d; }

  input[type="number"], input[type="search"], input[type="text"], select, textarea {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 7px 10px;
    font-size: 0.9rem;
    font-family: inherit;
  }
  input[type="number"] { width: 84px; }
  input[type="search"] { width: 200px; }
  input:focus, select:focus, textarea:focus { outline: 1px solid var(--accent); }

  .reset-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    text-decoration: underline;
  }
  .reset-btn:hover { color: var(--text); }

  .status-bar {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 12px;
  }

  .progress-wrap {
    max-width: 480px;
    margin: 24px auto;
    padding: 0 24px;
    text-align: center;
  }
  .progress-track {
    height: 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent-2), var(--accent));
    border-radius: 999px;
    transition: width 0.25s ease;
  }
  .progress-text {
    margin-top: 8px;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(210px, 100%), 1fr));
    gap: 18px;
    padding: 8px 24px 48px;
    max-width: 1700px;
    margin: 0 auto;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.12s, box-shadow 0.12s;
    position: relative;
    content-visibility: auto;
    contain-intrinsic-size: 230px 420px;
  }
  .card.filtered-out { display: none; }
  .card { cursor: pointer; }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 22px rgba(0,0,0,0.5);
  }
  .card .img-link {
    display: block;
    line-height: 0;
    width: 100%;
    padding: 0;
    border: none;
    background: none;
    cursor: pointer;
  }
  .card .img-link:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .card img {
    width: 100%;
    aspect-ratio: 488 / 680;
    object-fit: cover;
    background: #0a0d10;
  }
  .card .info {
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }
  .card .name {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.25;
  }
  .card .meta {
    font-size: 0.75rem;
    color: var(--muted);
  }
  .card .meta .foil { color: var(--gold); }
  .card .price-line {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .card .price {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--accent);
  }
  .card .price.unknown { color: var(--muted); font-weight: 400; }
  .card .price small { color: var(--muted); font-weight: 400; font-size: 0.74rem; }
  .card .cm-link {
    font-size: 0.74rem;
    color: var(--muted);
    text-decoration: none;
  }
  .card .cm-link:hover { color: var(--gold); text-decoration: underline; }

  .card .name-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 6px;
  }
  .fav-btn {
    border: none;
    background: none;
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
    padding: 0;
    color: #aab4bd;
    flex-shrink: 0;
    transition: transform 0.1s, color 0.1s;
    /* Mindest-Touchziel (WCAG 2.5.8), ohne die Zeile aufzublähen */
    min-width: 30px;
    min-height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin: -5px -6px 0 0;
  }
  .card .cm-link { display: inline-block; padding: 5px 0; }
  .fav-btn:hover { transform: scale(1.2); color: var(--gold); }
  .fav-btn.faved { color: var(--gold); }

  .qty-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(10,13,16,0.78);
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: var(--radius);
    padding: 3px 8px;
    font-size: 0.82rem;
    font-weight: 700;
  }

  /* Kompakte Galerieansicht: kleinere Kacheln, gleiche Infos */
  .grid.gallery {
    grid-template-columns: repeat(auto-fill, minmax(min(150px, 100%), 1fr));
    gap: 10px;
  }
  .grid.gallery .card {
    border-radius: var(--radius);
    contain-intrinsic-size: 160px 310px;
  }
  .grid.gallery .card .info { padding: 7px 8px 9px; gap: 2px; }
  .grid.gallery .card .name { font-size: 0.76rem; }
  .grid.gallery .card .meta { font-size: 0.66rem; }
  .grid.gallery .card .price { font-size: 0.8rem; }
  .grid.gallery .card .price small { font-size: 0.64rem; }
  .grid.gallery .card .cm-link { font-size: 0.64rem; }
  .grid.gallery .fav-btn { font-size: 1rem; }
  .grid.gallery .qty-badge {
    top: 6px;
    left: 6px;
    padding: 2px 6px;
    font-size: 0.74rem;
  }

  /* Schmale Screens: 2 Spalten statt einer Riesen-Kachel – mehr Scan-Dichte.
     Steht nach den .grid-/Galerie-Regeln, um sie bei gleicher Spezifität zu
     überschreiben. */
  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(min(150px, 100%), 1fr)); }
    .card .info { padding: 8px 9px 10px; gap: 3px; }
    .card .name { font-size: 0.8rem; }
    .card .meta { font-size: 0.68rem; }
    .card .price { font-size: 0.84rem; }
    .card .price small { font-size: 0.66rem; }
    .card .cm-link { font-size: 0.66rem; }
    .qty-badge { top: 6px; left: 6px; padding: 2px 6px; font-size: 0.74rem; }
  }

  .rarity-C { color: #c7c1b8; }
  .rarity-U { color: #b3c7d1; }
  .rarity-R { color: #e0b860; }
  .rarity-M { color: #e86a33; }

  .empty-note {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .error-box {
    max-width: 560px;
    margin: 40px auto;
    background: #3a1f24;
    border: 1px solid #7c3a44;
    border-radius: 10px;
    padding: 20px;
    text-align: center;

// =====================================================================
//  UI-Komponenten (Custom Elements)
// ---------------------------------------------------------------------
//  Jede Sektion der Oberfläche ist eine eigene Komponente. Die Layout-
//  Komponenten rendern reines Markup (Light DOM, kein Shadow DOM), damit
//  das bestehende CSS unverändert greift, und behalten ihre IDs, sodass
//  der App-Controller die Elemente weiterhin per getElementById findet.
// =====================================================================

// Hilfsfunktion für reine Markup-Komponenten ohne eigenes Verhalten.
function defineTemplate(tag, html) {
  customElements.define(tag, class extends HTMLElement {
    connectedCallback() {
      if (this._rendered) return;
      this._rendered = true;
      this.innerHTML = html;
    }
  });
}

(function () {
  // ===== Konstanten =====
  const COLLECTION_API = "https://api.scryfall.com/cards/collection";
  const FUZZY_API = "https://api.scryfall.com/cards/named?fuzzy=";

  const FAV_KEY = "tmt-favorites-v1";
  const COLLECTIONS_KEY = "mtg-collections-v1";
  const CARD_CACHE_KEY = "mtg-card-cache-v3"; // v3: getrennte Normal-/Foil-Preise
  const ACTIVE_KEY = "mtg-active-collection-v1";
  const VIEW_KEY = "mtg-view-v1";
  const GROUP_KEY = "mtg-group-v1";

  const RARITY_LABEL = { common: "C", uncommon: "U", rare: "R", mythic: "M" };
  const RARITY_NAME = { common: "Common", uncommon: "Uncommon", rare: "Rare", mythic: "Mythic" };

  // ===== Zustand =====
  let cards = [];
  const cardEls = new Map(); // uid (Druck + Foil-Variante) -> <mtg-card>-Element
  let favorites = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || "[]"));
  const filters = { colors: new Set(), priceMin: null, priceMax: null, sort: "number", search: "", favsOnly: false, compareFilter: "all" };

  let collections = loadJson(COLLECTIONS_KEY, []);
  let cardCache = loadJson(CARD_CACHE_KEY, {}); // scryfallId -> vereinfachte Karte
  localStorage.removeItem("mtg-card-cache-v1"); // alter Cache ohne Textfelder
  localStorage.removeItem("mtg-card-cache-v2"); // alter Cache ohne getrennte Foil-Preise
  let activeId = localStorage.getItem(ACTIVE_KEY);
  if (!collections.some(c => c.id === activeId)) {
    activeId = collections.length ? collections[0].id : null;
  }
  let loadToken = 0; // entwertet laufende Ladevorgänge beim Collection-Wechsel

  let cmInfo = null;
  let pendingCmPrices = null;

  // ===== DOM =====
  const grid = document.getElementById("grid");
  const statusBar = document.getElementById("status");
  const emptyNote = document.getElementById("empty-note");
  const progress = document.getElementById("progress");
  const progressFill = document.getElementById("progress-fill");
  const progressText = document.getElementById("progress-text");
  const colSelect = document.getElementById("collection-select");
  const modalOverlay = document.getElementById("modal-overlay");
  const colStatus = document.getElementById("col-status");

  // ===== Hilfsfunktionen =====
  function loadJson(key, fallback) {
    try {
      const v = JSON.parse(localStorage.getItem(key));
      return v === null || v === undefined ? fallback : v;
    } catch (e) { return fallback; }
  }
  function saveJson(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch (e) { alert("Speichern fehlgeschlagen – der Browser-Speicher ist voll."); }
  }
  function saveFavorites() { saveJson(FAV_KEY, [...favorites]); }
  function saveCollections() { saveJson(COLLECTIONS_KEY, collections); }
  function saveCardCache() { saveJson(CARD_CACHE_KEY, cardCache); }

  function normName(s) {
    return s.toLowerCase().replace(/’/g, "'").trim();
  }

  function numOrNull(v) {
    const n = parseFloat(v);
    return isNaN(n) ? null : n;
  }

  function cheapestPrice(prices) {
    const vals = [prices.eur, prices.eur_foil]
      .map(parseFloat)
      .filter(v => !isNaN(v));
    return vals.length ? Math.min(...vals) : null;
  }

  // Eindeutiger Schlüssel eines Exemplars in der Ansicht: Druck + Foil-Variante.
  // Nicht-Foil nutzt die nackte Scryfall-ID, damit alte Favoriten gültig bleiben.
  function uidOf(card) {
    return card.id + (card.foil ? ":f" : "");
  }

  // Wirksamen Preis je Exemplar bestimmen: Foil-Exemplare nutzen den Foil-Preis,
  // normale den Normalpreis – mit Fallback auf den jeweils anderen (z. B. bei
  // Foil-only-Drucken). Alte Exporte ohne getrennte Preise nutzen card.price.
  function finalizePrice(card) {
    const eur = card.priceEur !== undefined ? card.priceEur : (card.foilOnly ? null : card.price);
    const foil = card.priceFoil !== undefined ? card.priceFoil : (card.foilOnly ? card.price : null);
    if (card.foil) {
      card.price = foil !== null && foil !== undefined ? foil : (eur ?? null);
      card.priceIsFoil = true;
    } else if (eur !== null && eur !== undefined) {
      card.price = eur;
      card.priceIsFoil = false;
    } else {
      card.price = foil ?? null;
      card.priceIsFoil = card.price !== null;
    }
  }

  function simplify(card) {
    const faces = card.card_faces || [card];
    const img = card.image_uris || (card.card_faces && card.card_faces[0].image_uris) || {};
    return {
      id: card.id,
      name: card.name,
      set: card.set,
      number: card.collector_number,
      numSort: parseInt(card.collector_number, 10) || 0,
      colors: card.colors !== undefined ? card.colors
            : (card.card_faces ? [...new Set(card.card_faces.flatMap(f => f.colors || []))] : []),
      rarity: card.rarity,
      typeLine: card.type_line || faces.map(f => f.type_line).filter(Boolean).join(" // "),
      oracle: faces.map(f => f.oracle_text || "").filter(Boolean).join("\n"),
      flavor: faces.map(f => f.flavor_text || "").filter(Boolean).join("\n"),
      imageSmall: img.small || "",
      image: img.normal || img.large || img.small || "",
      url: card.scryfall_uri,
      cmId: card.cardmarket_id || null,
      cmUrl: (card.purchase_uris && card.purchase_uris.cardmarket) || "",
      priceEur: numOrNull((card.prices || {}).eur),
      priceFoil: numOrNull((card.prices || {}).eur_foil),
      price: cheapestPrice(card.prices || {}),
      foilOnly: !(card.prices && card.prices.eur) && !!(card.prices && card.prices.eur_foil),
      trend: null
    };
  }

  // Durchsuchbarer Gesamttext einer Karte (einmal berechnet, dann gemerkt).
  // Funktioniert auch für Karten aus alten Exporten ohne Textfelder.
  function searchTextOf(card) {
    if (!card._search) {
      card._search = normName(
        [card.name, card.typeLine, card.oracle, card.flavor].filter(Boolean).join("\n")
      );
    }
    return card._search;
  }

  function formatEur(v) {
    return v.toLocaleString("de-DE", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
  }

  // Physische Stückzahl einer Collection (nicht nur verschiedene Drucke)
  function countCards(entries) {
    return entries.reduce((s, e) => s + (e.qty || 1), 0);
  }

  // ===== Cardmarket-Preise (prices.json aus dem offiziellen Price Guide) =====
  async function loadCardmarketPrices() {
    try {
      const res = await fetch("prices.json", { cache: "no-store" });
      if (!res.ok) return;
      const data = await res.json();
      if (!data || !data.prices) return;
      cmInfo = { updatedAt: data.updatedAt };
      pendingCmPrices = data.prices;
      for (const card of cards) applyCardmarketPrice(card, data.prices);
      applyFilters();
    } catch (e) { /* nicht erreichbar -> Scryfall-Preise behalten */ }
  }

  function applyCardmarketPrice(card, prices) {
    const p = card.cmId !== null ? prices[String(card.cmId)] : null;
    if (!p) return;
    if (typeof p.low !== "number" && typeof p.lowFoil !== "number") return;
    if (typeof p.low === "number") card.priceEur = p.low;
    if (typeof p.lowFoil === "number") card.priceFoil = p.lowFoil;
    card.trend = typeof p.trend === "number" ? p.trend : null;
    card.isCm = true;
    finalizePrice(card);
    const el = cardEls.get(uidOf(card));
    if (el) el.refreshPrice();
  }

  // ===== Laden: Collection =====
  function setProgress(loaded, total) {
    const pct = total ? Math.round((loaded / total) * 100) : 0;
    progressFill.style.width = pct + "%";
    progressText.textContent = "Lade Kartendaten: " + loaded + " / " + (total || "?") + " (" + pct + " %)";
  }
  function showProgress() {
    progress.hidden = false;
    progressFill.style.width = "0%";
    progressText.textContent = "Verbinde mit Scryfall …";
  }

  async function loadCollectionCards(col, token) {
    const have = [];
    const missingByCard = new Map(); // scryfallId -> [Einträge] (Foil + Normal je Druck)
    for (const entry of col.entries) {
      const cached = cardCache[entry.id];
      if (cached) have.push({ ...cached, qty: entry.qty, foil: !!entry.foil });
      else {
        if (!missingByCard.has(entry.id)) missingByCard.set(entry.id, []);
        missingByCard.get(entry.id).push(entry);
      }
    }
    setProgress(have.length, col.entries.length);
    if (have.length) addBatch(have, token);
    const missingIds = [...missingByCard.keys()];
    let loaded = have.length;
    for (let i = 0; i < missingIds.length; i += 75) {
      const slice = missingIds.slice(i, i + 75);
      const res = await fetch(COLLECTION_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifiers: slice.map(id => ({ id: id })) })
      });
      if (!res.ok) throw new Error("Scryfall antwortet mit Status " + res.status);
      const json = await res.json();
      if (token !== loadToken) return;
      const batch = [];
      for (const c of json.data) {
        const s = simplify(c);
        cardCache[c.id] = s;
        for (const entry of missingByCard.get(c.id) || []) {
          batch.push({ ...s, qty: entry.qty, foil: !!entry.foil });
          loaded++;
        }
      }
      saveCardCache();
      addBatch(batch, token);
      setProgress(Math.min(loaded, col.entries.length), col.entries.length);
    }
  }

  // Lädt alle Karten einer Collection (Cache zuerst, Rest von Scryfall)
  // und gibt sie gesammelt zurück – für den Vergleich zweier Collections.
  async function getCollectionCards(col) {
    const out = [];
    const missingByCard = new Map(); // scryfallId -> [Einträge]
    for (const entry of col.entries) {
      const cached = cardCache[entry.id];
      if (cached) out.push({ ...cached, qty: entry.qty, foil: !!entry.foil });
      else {
        if (!missingByCard.has(entry.id)) missingByCard.set(entry.id, []);
        missingByCard.get(entry.id).push(entry);
      }
    }
    const missingIds = [...missingByCard.keys()];
    for (let i = 0; i < missingIds.length; i += 75) {
      const slice = missingIds.slice(i, i + 75);
      const res = await fetch(COLLECTION_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifiers: slice.map(id => ({ id: id })) })
      });
      if (!res.ok) throw new Error("Scryfall antwortet mit Status " + res.status);
      const json = await res.json();
      for (const c of json.data) {
        const s = simplify(c);
        cardCache[c.id] = s;
        for (const entry of missingByCard.get(c.id) || []) {
          out.push({ ...s, qty: entry.qty, foil: !!entry.foil });
        }
      }
    }
    if (missingIds.length) saveCardCache();
    return out;
  }

  // ===== Vergleich zweier Collections =====
  let compareMode = null; // { a, b } oder null
  const compareBar = document.getElementById("compare-bar");
  const compareOverlay = document.getElementById("compare-overlay");

  // ===== Geteilte Collection anzeigen =====
  // Kodierung der Live-Links: ("1."|"0.") + base64url(deflate(text)),
  // "1." = deflate-komprimiert, "0." = unkomprimiert (Fallback für alte Browser)
  let sharedView = null; // { name, found } oder null
  const shareBar = document.getElementById("share-bar");

  function b64urlEncode(bytes) {
    let s = "";
    for (const b of bytes) s += String.fromCharCode(b);
    return btoa(s).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }
  function b64urlDecode(s) {
    s = s.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    return Uint8Array.from(atob(s), c => c.charCodeAt(0));
  }
  async function compressText(text) {
    const bytes = new TextEncoder().encode(text);
    if (typeof CompressionStream === "undefined") return "0." + b64urlEncode(bytes);
    const stream = new Blob([bytes]).stream().pipeThrough(new CompressionStream("deflate-raw"));
    return "1." + b64urlEncode(new Uint8Array(await new Response(stream).arrayBuffer()));
  }
  async function decompressText(s) {
    const bytes = b64urlDecode(s.slice(2));
    if (s.startsWith("0.")) return new TextDecoder().decode(bytes);
    if (typeof DecompressionStream === "undefined") {
      throw new Error("Dieser Browser kann den Link nicht entpacken (zu alt)");
    }
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
    return await new Response(stream).text();
  }

  function clearShareHash() {
    if (location.hash.startsWith("#live=")) {
      history.replaceState(null, "", location.pathname + location.search);
    }
  }
  function exitShareUi() {
    if (!sharedView) return;
    sharedView = null;
    shareBar.hidden = true;
    clearShareHash();
  }

  function adoptSharedCollection() {
    if (!sharedView) return;
    const entryByKey = new Map();
    for (const f of sharedView.found) {
      cardCache[f.card.id] = f.card;
      const k = f.card.id + (f.foil ? ":f" : "");
      const existing = entryByKey.get(k);
      if (existing) existing.qty += f.qty;
      else {
        const entry = { id: f.card.id, qty: f.qty };
        if (f.foil) entry.foil = true;
        entryByKey.set(k, entry);
      }
    }
    saveCardCache();
    const col = {
      id: "c" + Date.now().toString(36),
      name: sharedView.name,
      createdAt: new Date().toISOString(),
      entries: [...entryByKey.values()]
    };
    collections.push(col);
    saveCollections();
    switchCollection(col.id); // beendet auch die geteilte Ansicht
  }

  // ===== Live-Teilen über kvdb.io =====
  // Der Besitzer legt einmalig einen Speicher-Bucket mit write_key an (nur
  // lokal gespeichert). Geteilte Collections werden bei jeder Änderung
  // hochgeladen. Der Link enthält Bucket und Schlüssel-Name nur als
  // komprimierten, base64-kodierten Blob – nicht im Klartext.
  const LIVE_KEY = "mtg-live-store-v1";
  const KVDB_URL = "https://kvdb.io";
  let liveStore = loadJson(LIVE_KEY, null); // { bucket, writeKey, secretKey, shares: {colId: kvKey} }

  function saveLiveStore() { saveJson(LIVE_KEY, liveStore); }

  function randomToken(len) {
    const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const buf = new Uint32Array(len);
    crypto.getRandomValues(buf);
    let s = "";
    for (const v of buf) s += chars[v % chars.length];
    return s;
  }

  async function ensureLiveBucket() {
    if (liveStore && liveStore.bucket) return;
    // kvdb.io verlangt beim Anlegen eine E-Mail-Adresse, prüft sie aber
    // nicht. Wir senden eine generierte Adresse der reservierten
    // Beispiel-Domain – der Zugriff hängt allein an den lokalen Schlüsseln.
    const email = "mtg-" + randomToken(12).toLowerCase() + "@example.org";
    const writeKey = randomToken(24);
    const secretKey = randomToken(24);
    const res = await fetch(KVDB_URL, {
      method: "POST",
      body: new URLSearchParams({ email: email.trim(), write_key: writeKey, secret_key: secretKey })
    });
    const bucket = (await res.text()).trim();
    if (!res.ok || !/^[A-Za-z0-9]{10,}$/.test(bucket)) {
      throw new Error("Live-Speicher konnte nicht angelegt werden: " + bucket);
    }
    liveStore = { bucket: bucket, writeKey: writeKey, secretKey: secretKey, shares: {} };
    saveLiveStore();
    // Keys dauerhaft halten (Best Effort)
    fetch(KVDB_URL + "/" + bucket, {
      method: "PATCH",
      headers: { Authorization: "Basic " + btoa(secretKey + ":") },
      body: new URLSearchParams({ default_ttl: "0" })
    }).catch(() => {});
  }

  async function pushLiveCollection(col) {
    if (!liveStore || !liveStore.shares[col.id]) return;
    const colCards = await getCollectionCards(col);
    const payload = {
      v: 2, // v2: viertes Element = Foil-Flag
      name: col.name,
      updatedAt: new Date().toISOString(),
      cards: colCards.map(c => [c.set, c.number, c.qty || 1, c.foil ? 1 : 0])
    };
    const res = await fetch(KVDB_URL + "/" + liveStore.bucket + "/" + liveStore.shares[col.id], {
      method: "PUT",
      headers: { Authorization: "Basic " + btoa(liveStore.writeKey + ":") },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error("Hochladen fehlgeschlagen (Status " + res.status + ")");
  }

  // Nach Änderungen an einer live geteilten Collection aufrufen
  function syncLiveShare(col) {
    if (col && liveStore && liveStore.shares[col.id]) {
      pushLiveCollection(col).catch(() => { /* nächster Push versucht es erneut */ });
    }
  }

  async function shareLiveCollection() {
    const col = currentCollection();
    if (!col) return;
    try {
      await ensureLiveBucket();
      if (!liveStore.shares[col.id]) {
        liveStore.shares[col.id] = randomToken(12);
        saveLiveStore();
        renderCollectionSelect();
      }
      await pushLiveCollection(col);
      const blob = await compressText("kv|" + liveStore.bucket + "|" + liveStore.shares[col.id]);
      const url = location.origin + location.pathname + "#live=" + blob;
      if (navigator.share) {
        await navigator.share({ title: col.name, url: url });
      } else {
        await navigator.clipboard.writeText(url);
        alert("Der Live-Link wurde in die Zwischenablage kopiert.\n" +
          "Änderungen an dieser Collection werden ab jetzt automatisch hochgeladen.");
      }
    } catch (e) {
      if (e.name !== "AbortError") alert("Live-Teilen fehlgeschlagen: " + e.message);
    }
  }

  function removeLiveShare(colId) {
    if (!liveStore || !liveStore.shares[colId]) return;
    const kvKey = liveStore.shares[colId];
    delete liveStore.shares[colId];
    saveLiveStore();
    fetch(KVDB_URL + "/" + liveStore.bucket + "/" + kvKey, {
      method: "DELETE",
      headers: { Authorization: "Basic " + btoa(liveStore.writeKey + ":") }
    }).catch(() => {});
  }

  function stopLiveShare() {
    const col = currentCollection();
    if (!col || !liveStore || !liveStore.shares[col.id]) return;
    removeLiveShare(col.id);
    renderCollectionSelect();
    alert("Live-Teilen beendet – bestehende Links zeigen die Collection nicht mehr an.");
  }

  // Liest "#live=…" aus der URL, holt den aktuellen Stand vom Speicher
  // und zeigt ihn schreibgeschützt an. Tab-Reload lädt immer frisch.
  async function openLiveFromHash() {
    const m = location.hash.match(/^#live=(.+)$/);
    if (!m) return false;
    try {
      const text = await decompressText(decodeURIComponent(m[1]));
      const parts = text.split("|");
      if (parts[0] !== "kv" || !parts[1] || !parts[2]) throw new Error("Ungültiger Link");
      loadToken++;
      const token = loadToken;
      cards = [];
      cardEls.clear();
      grid.replaceChildren();
      emptyNote.hidden = true;
      showProgress();
      progressText.textContent = "Lade geteilte Collection …";
      const res = await fetch(KVDB_URL + "/" + parts[1] + "/" + parts[2], { cache: "no-store" });
      if (res.status === 404) throw new Error("Diese Collection wird nicht mehr geteilt");
      if (!res.ok) throw new Error("Speicher antwortet mit Status " + res.status);
      const payload = await res.json();
      const entries = (payload.cards || []).map(c => ({
        qty: parseInt(c[2], 10) || 1,
        ident: { set: String(c[0]), collector_number: String(c[1]) },
        raw: c[0] + " " + c[1],
        foil: !!(c[3] && parseInt(c[3], 10))
      }));
      if (!entries.length) throw new Error("Die geteilte Collection ist leer");
      const { found } = await resolveEntries(entries, t => { progressText.textContent = t; });
      if (token !== loadToken) return true;
      if (!found.length) throw new Error("Keine der Karten konnte geladen werden");
      sharedView = { name: payload.name || "Geteilte Collection", found: found };
      const stand = payload.updatedAt ? new Date(payload.updatedAt).toLocaleString("de-DE") : "";
      document.getElementById("share-title").textContent =
        "Live geteilt: „" + sharedView.name + "“ (" + found.length + " Karten" +
        (stand ? " · Stand " + stand : "") + ")";
      shareBar.hidden = false;
      addBatch(found.map(f => ({ ...f.card, qty: f.qty, foil: !!f.foil })), token);
      progress.hidden = true;
      return true;
    } catch (e) {
      alert("Der Live-Link konnte nicht geladen werden: " + e.message);
      clearShareHash();
      return false;
    }
  }

  function exitCompareUi() {
    compareMode = null;
    filters.compareFilter = "all";
    compareBar.hidden = true;
    document.querySelectorAll(".cmp-chip").forEach(ch =>
      ch.classList.toggle("active", ch.dataset.cmp === "all"));
  }

  function openCompareDialog() {
    const a = currentCollection();
    if (!a || collections.length < 2) return;
    const sel = document.getElementById("compare-select");
    sel.innerHTML = "";
    for (const c of collections) {
      if (c.id === a.id) continue;
      const opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = c.name + " (" + countCards(c.entries) + " Karten)";
      sel.appendChild(opt);
    }
    document.getElementById("compare-hint").textContent =
      "„" + a.name + "“ vergleichen mit:";
    compareOverlay.hidden = false;
  }

  async function startCompare(bId) {
    const a = currentCollection();
    const b = collections.find(c => c.id === bId);
    if (!a || !b) return;
    compareOverlay.hidden = true;
    loadToken++;
    const token = loadToken;
    cards = [];
    cardEls.clear();
    grid.replaceChildren();
    emptyNote.hidden = true;
    showProgress();
    progressText.textContent = "Lade beide Collections …";
    try {
      const [aCards, bCards] = await Promise.all([getCollectionCards(a), getCollectionCards(b)]);
      if (token !== loadToken) return;
      // Verglichen wird über den Kartennamen (verschiedene Drucke zählen zusammen)
      const byName = new Map();
      for (const c of aCards) {
        const key = normName(c.name);
        const e = byName.get(key);
        if (e) e.qtyA += c.qty || 1;
        else byName.set(key, { card: c, qtyA: c.qty || 1, qtyB: 0 });
      }
      for (const c of bCards) {
        const key = normName(c.name);
        const e = byName.get(key);
        if (e) e.qtyB += c.qty || 1;
        else byName.set(key, { card: c, qtyA: 0, qtyB: c.qty || 1 });
      }
      const list = [...byName.values()].map(e => ({
        ...e.card,
        foil: false, // im Vergleich zählen alle Varianten eines Namens zusammen
        qty: e.qtyA + e.qtyB,
        compare: {
          a: e.qtyA,
          b: e.qtyB,
          state: e.qtyA && e.qtyB ? "both" : (e.qtyA ? "onlyA" : "onlyB")
        }
      }));
      compareMode = { a, b };
      filters.compareFilter = "all";
      const counts = { both: 0, onlyA: 0, onlyB: 0 };
      for (const c of list) counts[c.compare.state]++;
      document.getElementById("compare-title").textContent =
        "Vergleich: „" + a.name + "“ ↔ „" + b.name + "“";
      const chipLabels = {
        all: "Alle (" + list.length + ")",
        both: "In beiden (" + counts.both + ")",
        onlyA: "Nur " + shortName(a.name, 14) + " (" + counts.onlyA + ")",
        onlyB: "Nur " + shortName(b.name, 14) + " (" + counts.onlyB + ")"
      };
      document.querySelectorAll(".cmp-chip").forEach(ch => {
        ch.textContent = chipLabels[ch.dataset.cmp];
        ch.classList.toggle("active", ch.dataset.cmp === "all");
      });
      compareBar.hidden = false;
      addBatch(list, token);
      progress.hidden = true;
    } catch (err) {
      if (token !== loadToken) return;
      progress.hidden = true;
      emptyNote.textContent = "Vergleich fehlgeschlagen: " + err.message;
      emptyNote.hidden = false;
    }
  }

  function shortName(s, n) {
    return s.length > n ? s.slice(0, n - 1) + "…" : s;
  }

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function cmpBadgeLabel(cmp) {
    const a = escapeHtml(shortName(compareMode.a.name, 10));
    const b = escapeHtml(shortName(compareMode.b.name, 10));
    if (cmp.state === "both") return a + " " + cmp.a + "× · " + b + " " + cmp.b + "×";
    if (cmp.state === "onlyA") return "nur " + a + (cmp.a > 1 ? " (" + cmp.a + "×)" : "");
    return "nur " + b + (cmp.b > 1 ? " (" + cmp.b + "×)" : "");
  }

  // ===== Collection-Verwaltung =====
  function currentCollection() {
    return collections.find(c => c.id === activeId) || null;
  }

  function renderCollectionSelect() {
    colSelect.innerHTML = "";
    if (!collections.length) {
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "– noch keine Collection –";
      colSelect.appendChild(opt);
    }
    for (const col of collections) {
      const opt = document.createElement("option");
      opt.value = col.id;
      opt.textContent = col.name + " (" + countCards(col.entries) + " Karten)";
      colSelect.appendChild(opt);
    }
    colSelect.value = activeId || "";
    const none = !currentCollection();
    document.getElementById("col-delete").disabled = none;
    document.getElementById("col-export").disabled = none;
    document.getElementById("col-add").disabled = none;
    document.getElementById("col-compare").disabled = none || collections.length < 2;
    document.getElementById("col-rename").disabled = none;
    document.getElementById("col-live").disabled = none;
    document.getElementById("col-live-stop").disabled =
      none || !liveStore || !liveStore.shares[activeId];
  }

  function switchCollection(id) {
    exitCompareUi();
    exitShareUi();
    closeCardDetail(); // Detail einer anderen Collection wäre veraltet
    activeId = id;
    if (id) localStorage.setItem(ACTIVE_KEY, id);
    else localStorage.removeItem(ACTIVE_KEY);
    renderCollectionSelect();
    loadToken++;
    const token = loadToken;
    cards = [];
    cardEls.clear();
    grid.replaceChildren();
    const col = currentCollection();
    if (!col) {
      progress.hidden = true;
      emptyNote.innerHTML = 'Noch keine Collection vorhanden. ' +
        '<br><br><button class="btn primary" id="empty-cta">+ Neue Collection anlegen</button>';
      document.getElementById("empty-cta").addEventListener("click", () => openModal("create"));
      emptyNote.hidden = false;
      applyFilters();
      return;
    }
    emptyNote.textContent = "Keine Karten gefunden – Filter anpassen.";
    emptyNote.hidden = true;
    showProgress();
    applyFilters();
    loadCollectionCards(col, token)
      .then(() => { if (token === loadToken) progress.hidden = true; })
      .catch(err => {
        if (token !== loadToken) return;
        progress.hidden = true;
        const box = document.createElement("div");
        box.className = "error-box";
        box.innerHTML = "Karten konnten nicht geladen werden:<br><strong>" + err.message +
          "</strong><br><button onclick=\"location.reload()\">Erneut versuchen</button>";
        grid.before(box);
      });
  }

  function renameCurrentCollection() {
    const col = currentCollection();
    if (!col) return;
    const name = prompt("Neuer Name für die Collection:", col.name);
    if (name === null) return;
    const trimmed = name.trim();
    if (!trimmed) return;
    col.name = trimmed;
    saveCollections();
    renderCollectionSelect();
    syncLiveShare(col); // Name steckt auch im Live-Share-Datensatz
  }

  function deleteCurrentCollection() {
    const col = currentCollection();
    if (!col) return;
    if (!confirm('Collection "' + col.name + '" wirklich löschen?')) return;
    removeLiveShare(col.id); // ggf. Live-Teilen mit beenden
    collections = collections.filter(c => c.id !== col.id);
    saveCollections();
    switchCollection(collections.length ? collections[0].id : null);
  }

  function exportCurrentCollection() {
    const col = currentCollection();
    if (!col) return;
    const name = col.name;
    const data = {
      format: "mtg-collection-v1",
      name: name,
      exportedAt: new Date().toISOString(),
      cards: cards.map(c => ({ qty: c.qty || 1, card: { ...c, qty: undefined } }))
    };
    const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name.replace(/[^\wäöüÄÖÜß -]/g, "_") + ".json";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function importCollectionFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.format !== "mtg-collection-v1" || !Array.isArray(data.cards)) {
          throw new Error("Kein gültiges Collection-Export-Format");
        }
        const entries = [];
        for (const item of data.cards) {
          if (!item.card || !item.card.id) continue;
          cardCache[item.card.id] = { ...item.card, qty: undefined, foil: undefined };
          const entry = { id: item.card.id, qty: item.qty || 1 };
          if (item.card.foil) entry.foil = true;
          entries.push(entry);
        }
        if (!entries.length) throw new Error("Die Datei enthält keine Karten");
        saveCardCache();
        const col = {
          id: "c" + Date.now().toString(36),
          name: data.name || file.name.replace(/\.json$/i, ""),
          createdAt: new Date().toISOString(),
          entries: entries
        };
        collections.push(col);
        saveCollections();
        switchCollection(col.id);
      } catch (e) {
        alert("Import fehlgeschlagen: " + e.message);
      }
    };
    reader.readAsText(file);
  }

  // ===== Listen-Parser =====
  function cleanName(s) {
    return s
      .replace(/\s*[*([]F[*)\]]\s*$/i, "")   // Foil-Markierungen *F* (F) [F]
      .replace(/\s+#.*$/, "")                  // Kommentare nach #
      .trim();
  }

  // Foil-Markierung am Ende: *F* (F) [F]
  function hasFoilMarker(s) {
    return /[*([]F[*)\]]\s*$/i.test(s.trim());
  }

  function parseList(text, setHint) {
    const merged = new Map(); // key -> {qty, ident, raw, foil}
    const errors = [];
    function add(key, qty, ident, raw, foil) {
      const existing = merged.get(key);
      if (existing) existing.qty += qty;
      else merged.set(key, { qty, ident, raw, foil: !!foil });
    }
    for (const rawLine of text.split("\n")) {
      let line = rawLine.trim();
      if (!line || line.startsWith("//") || line.startsWith("#")) continue;
      line = line.replace(/^[-*]\s*\[[ xX]\]\s*/, "").replace(/^[-*]\s+/, "").trim();
      if (!line) continue;
      let m;
      // Arena/Moxfield: "1 Name (SET) 123" (Sammlernummer optional, "*F*" = Foil)
      if ((m = line.match(/^(\d{1,3})[xX]?\s+(.+?)\s+\(([A-Za-z0-9]{2,6})\)\s+([A-Za-z0-9★†-]+)\s*(.*)$/))) {
        const set = m[3].toLowerCase();
        const foil = hasFoilMarker(m[5]);
        add("n:" + set + ":" + m[4] + (foil ? ":f" : ""), parseInt(m[1], 10),
          { set: set, collector_number: m[4] }, rawLine, foil);
        continue;
      }
      if ((m = line.match(/^(\d{1,3})[xX]?\s+(.+?)\s+\(([A-Za-z0-9]{2,6})\)\s*$/))) {
        const set = m[3].toLowerCase();
        const foil = hasFoilMarker(m[2]);
        const name = cleanName(m[2]);
        add("m:" + normName(name) + "|" + set + (foil ? ":f" : ""), parseInt(m[1], 10),
          { name: name, set: set }, rawLine, foil);
        continue;
      }
      // Set-Liste mit Sammlernummer: "0017 Name ..." (Set-Code nötig)
      if ((m = line.match(/^(\d{1,4})\s+(.+)$/)) && (m[1].length >= 3 || m[1][0] === "0")) {
        if (setHint) {
          const num = String(parseInt(m[1], 10));
          const foil = hasFoilMarker(m[2]);
          add("n:" + setHint + ":" + num + (foil ? ":f" : ""), 1,
            { set: setHint, collector_number: num }, rawLine, foil);
        } else {
          errors.push(rawLine + "   → Sammlernummer erkannt, aber kein Set-Code angegeben");
        }
        continue;
      }
      // "4x Name" / "4 Name"
      if ((m = line.match(/^(\d{1,3})[xX]?\s+(.+)$/))) {
        const foil = hasFoilMarker(m[2]);
        const name = cleanName(m[2]);
        add("m:" + normName(name) + (foil ? ":f" : ""), parseInt(m[1], 10), { name: name }, rawLine, foil);
        continue;
      }
      // Nur der Kartenname
      const foil = hasFoilMarker(line);
      const name = cleanName(line);
      if (name) add("m:" + normName(name) + (foil ? ":f" : ""), 1, { name: name }, rawLine, foil);
    }
    return { entries: [...merged.values()], errors };
  }

  // ===== Auflösung über Scryfall =====
  async function resolveEntries(entries, onStatus) {
    const found = [];
    const unresolved = [];
    const fuzzyQueue = [];

    for (let i = 0; i < entries.length; i += 75) {
      const batch = entries.slice(i, i + 75);
      onStatus("Löse Karten auf … " + Math.min(i + 75, entries.length) + " / " + entries.length);
      // Foil- und Normal-Exemplare desselben Drucks teilen sich einen Identifier
      const identSeen = new Set();
      const idents = [];
      for (const e of batch) {
        const k = JSON.stringify(e.ident);
        if (!identSeen.has(k)) { identSeen.add(k); idents.push(e.ident); }
      }
      const res = await fetch(COLLECTION_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifiers: idents })
      });
      if (!res.ok) throw new Error("Scryfall antwortet mit Status " + res.status);
      const json = await res.json();

      // Gefundene Karten indexieren, dann jeden Eintrag seiner Karte zuordnen
      const bySetNum = new Map();
      const byName = new Map();
      for (const card of json.data) {
        bySetNum.set(card.set + ":" + card.collector_number.toLowerCase(), card);
        for (const n of [normName(card.name), normName(card.name.split(" // ")[0])]) {
          byName.set(n + "|" + card.set, card);
          if (!byName.has(n)) byName.set(n, card);
        }
      }
      for (const e of batch) {
        let card = null;
        if (e.ident.collector_number) {
          card = bySetNum.get(e.ident.set + ":" + e.ident.collector_number.toLowerCase());
        } else {
          const n = normName(e.ident.name);
          card = (e.ident.set && byName.get(n + "|" + e.ident.set)) || byName.get(n);
        }
        if (card) found.push({ card: simplify(card), qty: e.qty, foil: !!e.foil });
        else if (e.ident.name) fuzzyQueue.push(e);
        else unresolved.push(e.raw);
      }
    }

    for (const e of fuzzyQueue) {
      onStatus("Unscharfe Suche: " + e.ident.name + " …");
      try {
        const res = await fetch(FUZZY_API + encodeURIComponent(e.ident.name));
        if (res.ok) found.push({ card: simplify(await res.json()), qty: e.qty, foil: !!e.foil });
        else unresolved.push(e.raw);
      } catch (err) { unresolved.push(e.raw); }
      await new Promise(r => setTimeout(r, 120)); // API schonen
    }
    return { found, unresolved };
  }

  // ===== Modal: Collection anlegen / Karten hinzufügen =====
  let modalMode = "create";

  function openModal(mode) {
    modalMode = mode === "add" ? "add" : "create";
    const isAdd = modalMode === "add";
    document.getElementById("modal-title").textContent = isAdd
      ? "Karten hinzufügen zu „" + currentCollection().name + "“"
      : "Neue Collection anlegen";
    document.getElementById("col-name-wrap").style.display = isAdd ? "none" : "";
    document.getElementById("col-create").textContent = isAdd ? "Karten hinzufügen" : "Collection erstellen";
    document.getElementById("col-name").value = "";
    document.getElementById("col-set").value = "";
    document.getElementById("col-list").value = "";
    colStatus.innerHTML = "";
    document.getElementById("col-create").disabled = false;
    modalOverlay.hidden = false;
    (isAdd ? document.getElementById("col-list") : document.getElementById("col-name")).focus();
  }
  function closeModal() { modalOverlay.hidden = true; }

  async function handleModalSubmit() {
    const isAdd = modalMode === "add";
    const name = document.getElementById("col-name").value.trim();
    const setHint = document.getElementById("col-set").value.trim().toLowerCase();
    const text = document.getElementById("col-list").value;
    if (!isAdd && !name) { colStatus.innerHTML = '<span class="warn">Bitte einen Namen angeben.</span>'; return; }
    if (!text.trim()) { colStatus.innerHTML = '<span class="warn">Bitte eine Kartenliste einfügen.</span>'; return; }

    const { entries, errors } = parseList(text, setHint || null);
    if (!entries.length) {
      colStatus.innerHTML = '<span class="warn">Keine gültigen Zeilen erkannt.</span>' +
        (errors.length ? "\n" + errors.join("\n") : "");
      return;
    }

    const createBtn = document.getElementById("col-create");
    createBtn.disabled = true;
    try {
      const { found, unresolved } = await resolveEntries(entries, t => { colStatus.textContent = t; });
      if (!found.length) {
        colStatus.innerHTML = '<span class="warn">Keine der Karten konnte aufgelöst werden.</span>\n' +
          unresolved.concat(errors).join("\n");
        createBtn.disabled = false;
        return;
      }
      let col;
      if (isAdd) {
        col = currentCollection();
        const byKey = new Map(col.entries.map(e => [uidOf(e), e]));
        for (const f of found) {
          cardCache[f.card.id] = f.card;
          const k = f.card.id + (f.foil ? ":f" : "");
          const existing = byKey.get(k);
          if (existing) existing.qty += f.qty;
          else {
            const entry = { id: f.card.id, qty: f.qty };
            if (f.foil) entry.foil = true;
            col.entries.push(entry);
            byKey.set(k, entry);
          }
        }
        saveCardCache();
        saveCollections();
        switchCollection(col.id); // Ansicht mit neuen Karten neu aufbauen
        syncLiveShare(col);
      } else {
        // Duplikate (gleiches Exemplar über mehrere Zeilen) zusammenführen
        const entryByKey = new Map();
        for (const f of found) {
          cardCache[f.card.id] = f.card;
          const k = f.card.id + (f.foil ? ":f" : "");
          const existing = entryByKey.get(k);
          if (existing) existing.qty += f.qty;
          else {
            const entry = { id: f.card.id, qty: f.qty };
            if (f.foil) entry.foil = true;
            entryByKey.set(k, entry);
          }
        }
        saveCardCache();
        col = {
          id: "c" + Date.now().toString(36),
          name: name,
          createdAt: new Date().toISOString(),
          entries: [...entryByKey.values()]
        };
        collections.push(col);
        saveCollections();
        switchCollection(col.id);
      }

      const problems = unresolved.concat(errors);
      if (problems.length) {
        colStatus.innerHTML = '<span class="ok">' + found.reduce((s, f) => s + f.qty, 0) +
          ' Karten (' + found.length + ' verschiedene Drucke) übernommen.</span>' +
          '\n<span class="warn">Nicht zugeordnet (' + problems.length + " Zeilen):</span>\n" +
          problems.join("\n");
        createBtn.disabled = false;
      } else {
        closeModal();
      }
    } catch (err) {
      colStatus.innerHTML = '<span class="warn">Fehler: ' + err.message + "</span>";
      createBtn.disabled = false;
    }
  }

  // ===== Darstellung =====
  function priceHtml(card) {
    let html;
    if (card.price === null) {
      html = '<span class="price unknown">kein Preis verfügbar</span>';
    } else {
      const prefix = card.isCm ? "ab " : "";
      const foil = card.priceIsFoil ? " <small>(Foil)</small>" : "";
      const trend = card.trend !== null
        ? " <small>· Trend " + formatEur(card.trend) + "</small>"
        : "";
      html = '<span class="price">' + prefix + formatEur(card.price) + foil + trend + "</span>";
    }
    if (card.cmUrl) {
      html += '<a class="cm-link" href="' + card.cmUrl + '" target="_blank" rel="noopener"' +
        ' title="Angebote auf Cardmarket ansehen (dort nach Sprache und Zustand filterbar)">Cardmarket ↗</a>';
    }
    return html;
  }

  // ===== Detail-Ansicht (Panel auf Desktop, Bottom-Sheet mobil) =====
  function renderCardDetail(card) {
    const d = document.getElementById("card-detail");
