<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMNT – Magic: The Gathering Kartenübersicht</title>
<style>
  :root {
    --bg: #101418;
    --panel: #1a2128;
    --panel-2: #222b34;
    --text: #e8edf2;
    --muted: #93a1ad;
    --accent: #4cc964;
    --accent-2: #2e8b57;
    --gold: #f2c14e;
    --border: #2e3a44;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 24px 24px 8px;
    text-align: center;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 1.7rem;
    letter-spacing: 0.5px;
  }
  header h1 span { color: var(--accent); }
  header p { margin: 0; color: var(--muted); font-size: 0.9rem; }

  .controls {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    justify-content: center;
    margin-top: 16px;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .control-group .label {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }
  .color-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    font-weight: 700;
    font-size: 0.85rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--panel-2);
    color: var(--text);
    transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
  }
  .color-btn:hover { transform: scale(1.1); }
  .color-btn.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.45); }
  .color-btn[data-color="W"] { background: #f8f6d8; color: #4a4636; }
  .color-btn[data-color="U"] { background: #aae0fa; color: #0d4f8b; }
  .color-btn[data-color="B"] { background: #444049; color: #cbc2bf; }
  .color-btn[data-color="R"] { background: #f9aa8f; color: #8b2f1d; }
  .color-btn[data-color="G"] { background: #9bd3ae; color: #1c5734; }
  .color-btn[data-color="M"] { background: linear-gradient(135deg, #f2c14e, #c98a2e); color: #4d3505; }
  .color-btn[data-color="C"] { background: #c7c1b8; color: #4a463d; }

  input[type="number"], input[type="search"], select {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 0.9rem;
  }
  input[type="number"] { width: 84px; }
  input[type="search"] { width: 200px; }
  input:focus, select:focus { outline: 1px solid var(--accent); }

  .fav-filter-btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .fav-filter-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 8px rgba(242,193,78,0.35);
  }
  .reset-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    text-decoration: underline;
  }
  .reset-btn:hover { color: var(--text); }

  .status-bar {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 12px;
  }

  .progress-wrap {
    max-width: 480px;
    margin: 24px auto;
    padding: 0 24px;
    text-align: center;
  }
  .progress-track {
    height: 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent-2), var(--accent));
    border-radius: 999px;
    transition: width 0.25s ease;
  }
  .progress-text {
    margin-top: 8px;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 18px;
    padding: 8px 24px 48px;
    max-width: 1700px;
    margin: 0 auto;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.12s, box-shadow 0.12s;
    position: relative;
    content-visibility: auto;
    contain-intrinsic-size: 230px 420px;
  }
  .card.filtered-out { display: none; }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 22px rgba(0,0,0,0.5);
  }
  .card a.img-link { display: block; line-height: 0; }
  .card img {
    width: 100%;
    aspect-ratio: 488 / 680;
    object-fit: cover;
    background: #0a0d10;
  }
  .card .info {
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }
  .card .name {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.25;
  }
  .card .meta {
    font-size: 0.75rem;
    color: var(--muted);
  }
  .card .price {
    margin-top: auto;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--accent);
  }
  .card .price.unknown { color: var(--muted); font-weight: 400; }
  .card .price small { color: var(--muted); font-weight: 400; }

  .fav-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 1.15rem;
    background: rgba(10,13,16,0.72);
    color: #aab4bd;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, color 0.1s;
  }
  .fav-btn:hover { transform: scale(1.15); color: var(--gold); }
  .fav-btn.faved { color: var(--gold); }

  .rarity-C { color: #c7c1b8; }
  .rarity-U { color: #b3c7d1; }
  .rarity-R { color: #e0b860; }
  .rarity-M { color: #e86a33; }

  .empty-note {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .error-box {
    max-width: 560px;
    margin: 40px auto;
    background: #3a1f24;
    border: 1px solid #7c3a44;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
  }
  .error-box button {
    margin-top: 12px;
    background: var(--accent-2);
    border: none;
    color: #fff;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <h1>🐢 Teenage Mutant Ninja Turtles <span>× Magic: The Gathering</span></h1>
  <p>Alle 320 Karten des Sets (TMT) · Preise &amp; Bilder live von Scryfall · günstigster Cardmarket-Preis</p>
</header>

<div class="controls">
  <div class="control-group">
    <span class="label">Farbe</span>
    <button class="color-btn" data-color="W" title="Weiß">W</button>
    <button class="color-btn" data-color="U" title="Blau">U</button>
    <button class="color-btn" data-color="B" title="Schwarz">B</button>
    <button class="color-btn" data-color="R" title="Rot">R</button>
    <button class="color-btn" data-color="G" title="Grün">G</button>
    <button class="color-btn" data-color="M" title="Mehrfarbig">M</button>
    <button class="color-btn" data-color="C" title="Farblos">C</button>
  </div>
  <div class="control-group">
    <span class="label">Preis €</span>
    <input type="number" id="price-min" min="0" step="0.5" placeholder="min">
    <span style="color:var(--muted)">–</span>
    <input type="number" id="price-max" min="0" step="0.5" placeholder="max">
  </div>
  <div class="control-group">
    <span class="label">Sortierung</span>
    <select id="sort">
      <option value="number">Sammlernummer</option>
      <option value="price-desc">Preis absteigend</option>
      <option value="price-asc">Preis aufsteigend</option>
      <option value="name">Name A–Z</option>
    </select>
  </div>
  <div class="control-group">
    <input type="search" id="search" placeholder="Karte suchen …">
  </div>
  <div class="control-group">
    <button class="fav-filter-btn" id="fav-filter">★ Nur Favoriten</button>
    <button class="reset-btn" id="reset">Filter zurücksetzen</button>
  </div>
</div>

<div class="status-bar" id="status"></div>

<div class="progress-wrap" id="progress">
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-text" id="progress-text">Verbinde mit Scryfall …</div>
</div>

<div class="empty-note" id="empty-note" hidden>Keine Karten gefunden – Filter anpassen.</div>
<div class="grid" id="grid"></div>

<script>
(function () {
  const SET_CODE = "tmt";
  const API_URL = "https://api.scryfall.com/cards/search?order=set&unique=prints&include_extras=true&include_variations=true&q=" +
    encodeURIComponent("e:" + SET_CODE);
  const CACHE_KEY = "tmt-card-cache-v1";
  const CACHE_TTL = 60 * 60 * 1000; // 1 Stunde, um die Scryfall-API zu schonen
  const FAV_KEY = "tmt-favorites-v1";

  const RARITY_LABEL = { common: "C", uncommon: "U", rare: "R", mythic: "M" };
  const RARITY_NAME = { common: "Common", uncommon: "Uncommon", rare: "Rare", mythic: "Mythic" };

  let cards = [];
  const cardEls = new Map(); // card.id -> DOM-Element (wird nur einmal gebaut)
  let favorites = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || "[]"));
  const filters = { colors: new Set(), priceMin: null, priceMax: null, sort: "number", search: "", favsOnly: false };

  const grid = document.getElementById("grid");
  const statusBar = document.getElementById("status");
  const emptyNote = document.getElementById("empty-note");
  const progress = document.getElementById("progress");
  const progressFill = document.getElementById("progress-fill");
  const progressText = document.getElementById("progress-text");

  function saveFavorites() {
    localStorage.setItem(FAV_KEY, JSON.stringify([...favorites]));
  }

  function cheapestPrice(prices) {
    const vals = [prices.eur, prices.eur_foil]
      .map(parseFloat)
      .filter(v => !isNaN(v));
    return vals.length ? Math.min(...vals) : null;
  }

  function simplify(card) {
    const img = card.image_uris || (card.card_faces && card.card_faces[0].image_uris) || {};
    return {
      id: card.id,
      name: card.name,
      number: card.collector_number,
      numSort: parseInt(card.collector_number, 10) || 0,
      colors: card.colors !== undefined ? card.colors
            : (card.card_faces ? [...new Set(card.card_faces.flatMap(f => f.colors || []))] : []),
      rarity: card.rarity,
      imageSmall: img.small || "",
      image: img.normal || img.large || img.small || "",
      url: card.scryfall_uri,
      price: cheapestPrice(card.prices || {}),
      foilOnly: !(card.prices && card.prices.eur) && !!(card.prices && card.prices.eur_foil)
    };
  }

  function setProgress(loaded, total) {
    const pct = total ? Math.round((loaded / total) * 100) : 0;
    progressFill.style.width = pct + "%";
    progressText.textContent = "Lade Kartendaten: " + loaded + " / " + (total || "?") + " (" + pct + " %)";
  }

  // Lädt die Karten seitenweise und ruft onBatch nach jeder Seite auf,
  // damit die ersten Karten sofort sichtbar sind.
  async function loadCards(onBatch) {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      try {
        const { time, data } = JSON.parse(cached);
        if (Date.now() - time < CACHE_TTL && Array.isArray(data) && data.length) {
          setProgress(data.length, data.length);
          onBatch(data);
          return;
        }
      } catch (e) { /* Cache defekt -> neu laden */ }
    }
    let url = API_URL;
    const all = [];
    while (url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error("Scryfall antwortet mit Status " + res.status);
      const page = await res.json();
      const batch = page.data.map(simplify);
      all.push(...batch);
      setProgress(all.length, page.total_cards || all.length);
      onBatch(batch);
      url = page.has_more ? page.next_page : null;
    }
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ time: Date.now(), data: all }));
    } catch (e) { /* localStorage voll -> ohne Cache weiter */ }
  }

  function formatPrice(card) {
    if (card.price === null) return '<span class="price unknown">kein Preis verfügbar</span>';
    const eur = card.price.toFixed(2).replace(".", ",") + " €";
    const note = card.foilOnly ? " <small>(Foil)</small>" : " <small>ab</small>";
    return '<span class="price">' + eur + note + "</span>";
  }

  function buildCardEl(card) {
    const el = document.createElement("div");
    el.className = "card";
    // srcset: kleines Bild für kleine Kacheln/Mobil, normales für Desktop/Retina
    el.innerHTML =
      '<a class="img-link" href="' + card.url + '" target="_blank" rel="noopener">' +
        '<img loading="lazy" decoding="async"' +
        ' src="' + card.image + '"' +
        (card.imageSmall ? ' srcset="' + card.imageSmall + ' 146w, ' + card.image + ' 488w" sizes="(max-width: 600px) 45vw, 240px"' : "") +
        ' alt="' + card.name.replace(/"/g, "&quot;") + '">' +
      "</a>" +
      '<button class="fav-btn' + (favorites.has(card.id) ? " faved" : "") + '" title="Als Favorit markieren">' +
        (favorites.has(card.id) ? "★" : "☆") +
      "</button>" +
      '<div class="info">' +
        '<div class="name">' + card.name + "</div>" +
        '<div class="meta">#' + card.number + ' · <span class="rarity-' + (RARITY_LABEL[card.rarity] || "C") + '">' +
          (RARITY_NAME[card.rarity] || card.rarity) + "</span></div>" +
        formatPrice(card) +
      "</div>";
    el.querySelector(".fav-btn").addEventListener("click", e => {
      const btn = e.currentTarget;
      if (favorites.has(card.id)) {
        favorites.delete(card.id);
        btn.classList.remove("faved");
        btn.textContent = "☆";
      } else {
        favorites.add(card.id);
        btn.classList.add("faved");
        btn.textContent = "★";
      }
      saveFavorites();
      // Nur wenn der Favoriten-Filter aktiv ist, ändert sich die Sichtbarkeit
      if (filters.favsOnly) applyFilters();
      else updateStatus(grid.querySelectorAll(".card:not(.filtered-out)").length);
    });
    return el;
  }

  function matchesColorFilter(card) {
    if (filters.colors.size === 0) return true;
    const isMulti = card.colors.length > 1;
    const isColorless = card.colors.length === 0;
    for (const c of filters.colors) {
      if (c === "M" && isMulti) return true;
      if (c === "C" && isColorless) return true;
      if (card.colors.includes(c)) return true;
    }
    return false;
  }

  function matchesFilters(card) {
    if (!matchesColorFilter(card)) return false;
    if (filters.favsOnly && !favorites.has(card.id)) return false;
    if (filters.search && !card.name.toLowerCase().includes(filters.search)) return false;
    if (filters.priceMin !== null && (card.price === null || card.price < filters.priceMin)) return false;
    if (filters.priceMax !== null && (card.price === null || card.price > filters.priceMax)) return false;
    return true;
  }

  function sortedCards() {
    const list = [...cards];
    const noPrice = v => v.price === null;
    switch (filters.sort) {
      case "price-asc":
        list.sort((a, b) => noPrice(a) - noPrice(b) || (a.price ?? 0) - (b.price ?? 0) || a.numSort - b.numSort);
        break;
      case "price-desc":
        list.sort((a, b) => noPrice(a) - noPrice(b) || (b.price ?? 0) - (a.price ?? 0) || a.numSort - b.numSort);
        break;
      case "name":
        list.sort((a, b) => a.name.localeCompare(b.name, "de") || a.numSort - b.numSort);
        break;
      default:
        list.sort((a, b) => a.numSort - b.numSort);
    }
    return list;
  }

  function updateStatus(visibleCount) {
    statusBar.textContent = visibleCount + " von " + cards.length + " Karten · " + favorites.size + " Favoriten";
  }

  // Sichtbarkeit & Reihenfolge per CSS steuern statt das DOM neu zu bauen –
  // so werden die <img>-Elemente nie neu erzeugt.
  function applyFilters() {
    let visible = 0;
    for (const [i, card] of sortedCards().entries()) {
      const el = cardEls.get(card.id);
      if (!el) continue;
      const show = matchesFilters(card);
      el.classList.toggle("filtered-out", !show);
      el.style.order = i;
      if (show) visible++;
    }
    emptyNote.hidden = visible > 0 || cards.length === 0;
    updateStatus(visible);
  }

  function addBatch(batch) {
    const frag = document.createDocumentFragment();
    for (const card of batch) {
      if (cardEls.has(card.id)) continue;
      cards.push(card);
      const el = buildCardEl(card);
      cardEls.set(card.id, el);
      frag.appendChild(el);
    }
    grid.appendChild(frag);
    applyFilters();
  }

  // --- Steuerelemente verdrahten ---
  document.querySelectorAll(".color-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const c = btn.dataset.color;
      if (filters.colors.has(c)) { filters.colors.delete(c); btn.classList.remove("active"); }
      else { filters.colors.add(c); btn.classList.add("active"); }
      applyFilters();
    });
  });
  document.getElementById("price-min").addEventListener("input", e => {
    filters.priceMin = e.target.value === "" ? null : parseFloat(e.target.value);
    applyFilters();
  });
  document.getElementById("price-max").addEventListener("input", e => {
    filters.priceMax = e.target.value === "" ? null : parseFloat(e.target.value);
    applyFilters();
  });
  document.getElementById("sort").addEventListener("change", e => {
    filters.sort = e.target.value;
    applyFilters();
  });
  document.getElementById("search").addEventListener("input", e => {
    filters.search = e.target.value.trim().toLowerCase();
    applyFilters();
  });
  document.getElementById("fav-filter").addEventListener("click", e => {
    filters.favsOnly = !filters.favsOnly;
    e.currentTarget.classList.toggle("active", filters.favsOnly);
    applyFilters();
  });
  document.getElementById("reset").addEventListener("click", () => {
    filters.colors.clear();
    filters.priceMin = filters.priceMax = null;
    filters.sort = "number";
    filters.search = "";
    filters.favsOnly = false;
    document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("price-min").value = "";
    document.getElementById("price-max").value = "";
    document.getElementById("sort").value = "number";
    document.getElementById("search").value = "";
    document.getElementById("fav-filter").classList.remove("active");
    applyFilters();
  });

  loadCards(addBatch)
    .then(() => { progress.hidden = true; })
    .catch(err => {
      progress.hidden = true;
      const box = document.createElement("div");
      box.className = "error-box";
      box.innerHTML = "Karten konnten nicht geladen werden:<br><strong>" + err.message +
        "</strong><br><button onclick=\"location.reload()\">Erneut versuchen</button>";
      grid.before(box);
    });
})();
</script>
</body>
</html>
