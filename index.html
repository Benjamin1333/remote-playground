<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MTG Collections</title>
<style>
  :root {
    --bg: #101418;
    --panel: #1a2128;
    --panel-2: #222b34;
    --text: #e8edf2;
    --muted: #93a1ad;
    --accent: #4cc964;
    --accent-2: #2e8b57;
    --gold: #f2c14e;
    --border: #2e3a44;
  }
  * { box-sizing: border-box; }
  html, body {
    overflow-x: hidden;
    overflow-x: clip;
    overscroll-behavior-x: none;
    /* Blockiert Doppeltipp-Zoom, Scrollen/Pannen bleibt erlaubt */
    touch-action: pan-x pan-y;
  }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* Layout-Komponenten sind transparente Wrapper: ihre Vorlagen bringen
     dieselben Klassen/IDs mit wie zuvor, das Styling bleibt unverändert. */
  mtg-app-header, mtg-collection-bar, mtg-filter-controls, mtg-status-bar,
  mtg-compare-bar, mtg-share-bar, mtg-progress-bar,
  mtg-collection-modal, mtg-compare-modal, mtg-to-top { display: contents; }

  header {
    padding: 14px 16px 0;
    text-align: center;
  }
  header h1 {
    margin: 0;
    font-size: 1.35rem;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  header h1 span { color: var(--accent); }

  .collection-bar {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 640px;
    margin: 0 auto;
    padding: 14px 24px 0;
  }
  .collection-bar select { width: 100%; }
  .collection-actions {
    display: flex;
    gap: 8px;
  }
  .collection-actions > .bar-btn { flex: 1; }
  .more-wrap { flex: 0 0 auto; }
  .more-wrap > .bar-btn { width: 100%; min-width: 48px; height: 100%; }
  .bar-btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .bar-btn:hover { border-color: var(--accent); }
  .bar-btn.primary { border-color: var(--accent-2); color: var(--accent); }
  .bar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .bar-btn:disabled:hover { border-color: var(--border); }

  .more-wrap { position: relative; }
  .more-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    min-width: 200px;
    z-index: 30;
    overflow: hidden;
  }
  .more-menu[hidden] { display: none; }
  .more-menu button {
    background: none;
    border: none;
    color: var(--text);
    text-align: left;
    padding: 11px 14px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .more-menu button:hover { background: var(--panel-2); }
  .more-menu button:disabled { opacity: 0.4; cursor: not-allowed; }
  .more-menu button.danger { color: #e8838f; }

  .compare-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: center;
    padding: 10px 24px;
    background: var(--panel-2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .compare-bar[hidden] { display: none; }
  .compare-bar .cmp-title { font-size: 0.88rem; }
  .compare-bar .cmp-title strong { color: var(--accent); }
  .cmp-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .cmp-chip {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 0.82rem;
    cursor: pointer;
  }
  .cmp-chip.active { border-color: var(--accent); color: var(--accent); }

  .cmp-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    max-width: calc(100% - 16px);
    border-radius: 8px;
    padding: 3px 8px;
    font-size: 0.78rem;
    font-weight: 700;
    line-height: 1.3;
    background: rgba(10,13,16,0.82);
  }
  .cmp-badge.both { border: 1px solid var(--accent); color: var(--accent); }
  .cmp-badge.onlyA { border: 1px solid #7db8e8; color: #7db8e8; }
  .cmp-badge.onlyB { border: 1px solid #e8a87c; color: #e8a87c; }

  .to-top {
    position: fixed;
    bottom: 18px;
    right: 18px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 1.2rem;
    cursor: pointer;
    z-index: 50;
    box-shadow: 0 4px 14px rgba(0,0,0,0.45);
  }
  .to-top:hover { border-color: var(--accent); color: var(--accent); }

  .modal-small { max-width: 420px; }

  /* Mobile: größere Touch-Ziele, 16px-Inputs gegen iOS-Auto-Zoom */
  @media (max-width: 700px) {
    input[type="number"], input[type="search"], input[type="text"], select, textarea {
      font-size: 16px;
    }
    .color-btn { width: 42px; height: 42px; }
    .bar-btn, .view-btn, .fav-filter-btn, .cmp-chip { min-height: 42px; }
    .grid { padding: 8px 12px 48px; gap: 12px; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  .controls {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    justify-content: center;
    margin-top: 16px;
  }
  /* Auf dem Desktop verhält sich der Wrapper wie nicht vorhanden */
  .filter-groups {
    display: contents;
  }
  .filter-toggle {
    display: none;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 0.92rem;
    cursor: pointer;
    width: 100%;
  }
  @media (max-width: 700px) {
    .filter-toggle { display: block; }
    .controls.collapsed .filter-groups { display: none; }
    .controls { padding: 10px 16px; gap: 10px; }
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .control-group .label {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }
  .color-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    font-weight: 700;
    font-size: 0.85rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--panel-2);
    color: var(--text);
    transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
  }
  .color-btn:hover { transform: scale(1.1); }
  .color-btn.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.45); }
  .color-btn[data-color="W"] { background: #f8f6d8; color: #4a4636; }
  .color-btn[data-color="U"] { background: #aae0fa; color: #0d4f8b; }
  .color-btn[data-color="B"] { background: #444049; color: #cbc2bf; }
  .color-btn[data-color="R"] { background: #f9aa8f; color: #8b2f1d; }
  .color-btn[data-color="G"] { background: #9bd3ae; color: #1c5734; }
  .color-btn[data-color="M"] { background: linear-gradient(135deg, #f2c14e, #c98a2e); color: #4d3505; }
  .color-btn[data-color="C"] { background: #c7c1b8; color: #4a463d; }

  input[type="number"], input[type="search"], input[type="text"], select, textarea {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 0.9rem;
    font-family: inherit;
  }
  input[type="number"] { width: 84px; }
  input[type="search"] { width: 200px; }
  input:focus, select:focus, textarea:focus { outline: 1px solid var(--accent); }

  .view-btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .view-btn:hover { border-color: var(--accent); }
  .view-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 8px rgba(76,201,100,0.3);
  }

  .fav-filter-btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .fav-filter-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 8px rgba(242,193,78,0.35);
  }
  .reset-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    text-decoration: underline;
  }
  .reset-btn:hover { color: var(--text); }

  .status-bar {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 12px;
  }

  .progress-wrap {
    max-width: 480px;
    margin: 24px auto;
    padding: 0 24px;
    text-align: center;
  }
  .progress-track {
    height: 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent-2), var(--accent));
    border-radius: 999px;
    transition: width 0.25s ease;
  }
  .progress-text {
    margin-top: 8px;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(210px, 100%), 1fr));
    gap: 18px;
    padding: 8px 24px 48px;
    max-width: 1700px;
    margin: 0 auto;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.12s, box-shadow 0.12s;
    position: relative;
    content-visibility: auto;
    contain-intrinsic-size: 230px 420px;
  }
  .card.filtered-out { display: none; }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 22px rgba(0,0,0,0.5);
  }
  .card a.img-link { display: block; line-height: 0; }
  .card img {
    width: 100%;
    aspect-ratio: 488 / 680;
    object-fit: cover;
    background: #0a0d10;
  }
  .card .info {
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }
  .card .name {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.25;
  }
  .card .meta {
    font-size: 0.75rem;
    color: var(--muted);
  }
  .card .price-line {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .card .price {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--accent);
  }
  .card .price.unknown { color: var(--muted); font-weight: 400; }
  .card .price small { color: var(--muted); font-weight: 400; font-size: 0.74rem; }
  .card .cm-link {
    font-size: 0.74rem;
    color: var(--muted);
    text-decoration: none;
  }
  .card .cm-link:hover { color: var(--gold); text-decoration: underline; }

  .card .name-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 6px;
  }
  .fav-btn {
    border: none;
    background: none;
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
    padding: 0;
    color: #aab4bd;
    flex-shrink: 0;
    transition: transform 0.1s, color 0.1s;
  }
  .fav-btn:hover { transform: scale(1.2); color: var(--gold); }
  .fav-btn.faved { color: var(--gold); }

  .qty-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(10,13,16,0.78);
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 8px;
    padding: 3px 8px;
    font-size: 0.82rem;
    font-weight: 700;
  }

  /* Kompakte Galerieansicht: kleinere Kacheln, gleiche Infos */
  .grid.gallery {
    grid-template-columns: repeat(auto-fill, minmax(min(150px, 100%), 1fr));
    gap: 10px;
  }
  .grid.gallery .card {
    border-radius: 8px;
    contain-intrinsic-size: 160px 310px;
  }
  .grid.gallery .card .info { padding: 7px 8px 9px; gap: 2px; }
  .grid.gallery .card .name { font-size: 0.76rem; }
  .grid.gallery .card .meta { font-size: 0.66rem; }
  .grid.gallery .card .price { font-size: 0.8rem; }
  .grid.gallery .card .price small { font-size: 0.64rem; }
  .grid.gallery .card .cm-link { font-size: 0.64rem; }
  .grid.gallery .fav-btn { font-size: 1rem; }
  .grid.gallery .qty-badge {
    top: 6px;
    left: 6px;
    padding: 2px 6px;
    font-size: 0.74rem;
  }

  .rarity-C { color: #c7c1b8; }
  .rarity-U { color: #b3c7d1; }
  .rarity-R { color: #e0b860; }
  .rarity-M { color: #e86a33; }

  .empty-note {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .error-box {
    max-width: 560px;
    margin: 40px auto;
    background: #3a1f24;
    border: 1px solid #7c3a44;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
  }
  .error-box button {
    margin-top: 12px;
    background: var(--accent-2);
    border: none;
    color: #fff;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    z-index: 100;
    overflow-y: auto;
  }
  .modal-overlay[hidden] { display: none; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    width: 100%;
    max-width: 620px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .modal h2 { margin: 0; font-size: 1.2rem; }
  .modal label { font-size: 0.82rem; color: var(--muted); display: block; margin-bottom: 4px; }
  .modal .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .modal .row > div { flex: 1; min-width: 160px; }
  .modal input[type="text"] { width: 100%; }
  .modal textarea {
    width: 100%;
    min-height: 220px;
    resize: vertical;
    font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
    font-size: 0.82rem;
    line-height: 1.5;
  }
  .modal .hint { font-size: 0.76rem; color: var(--muted); line-height: 1.5; }
  .modal .buttons { display: flex; gap: 10px; justify-content: flex-end; }
  .modal .status {
    font-size: 0.82rem;
    color: var(--muted);
    white-space: pre-wrap;
    max-height: 180px;
    overflow-y: auto;
  }
  .modal .status .warn { color: #e8a87c; }
  .modal .status .ok { color: var(--accent); }
</style>
</head>
<body>

<mtg-app-header></mtg-app-header>
<mtg-collection-bar></mtg-collection-bar>
<mtg-filter-controls></mtg-filter-controls>
<mtg-status-bar></mtg-status-bar>
<mtg-compare-bar></mtg-compare-bar>
<mtg-share-bar></mtg-share-bar>
<mtg-progress-bar></mtg-progress-bar>

<div class="empty-note" id="empty-note" hidden>Keine Karten gefunden – Filter anpassen.</div>
<div class="grid" id="grid"></div>

<mtg-collection-modal></mtg-collection-modal>
<mtg-compare-modal></mtg-compare-modal>
<mtg-to-top></mtg-to-top>

<script>
// =====================================================================
//  UI-Komponenten (Custom Elements)
// ---------------------------------------------------------------------
//  Jede Sektion der Oberfläche ist eine eigene Komponente. Die Layout-
//  Komponenten rendern reines Markup (Light DOM, kein Shadow DOM), damit
//  das bestehende CSS unverändert greift, und behalten ihre IDs, sodass
//  der App-Controller die Elemente weiterhin per getElementById findet.
// =====================================================================

// Hilfsfunktion für reine Markup-Komponenten ohne eigenes Verhalten.
function defineTemplate(tag, html) {
  customElements.define(tag, class extends HTMLElement {
    connectedCallback() {
      if (this._rendered) return;
      this._rendered = true;
      this.innerHTML = html;
    }
  });
}

defineTemplate("mtg-app-header", `
  <header>
    <h1>🃏 MTG <span>Collections</span></h1>
  </header>`);

defineTemplate("mtg-collection-bar", `
  <div class="collection-bar">
    <select id="collection-select" aria-label="Collection auswählen"></select>
    <div class="collection-actions">
      <button class="bar-btn primary" id="col-new">+ Neu</button>
      <button class="bar-btn" id="col-add" title="Karten zur aktuellen Collection hinzufügen">+ Karten</button>
      <button class="bar-btn" id="col-compare" title="Zwei Collections vergleichen">⇄ Vergleichen</button>
      <div class="more-wrap">
        <button class="bar-btn" id="col-more" aria-haspopup="true" aria-expanded="false" title="Weitere Aktionen">⋯</button>
        <div class="more-menu" id="more-menu" hidden>
          <button id="col-rename">Umbenennen</button>
          <button id="col-live">Live-Link teilen</button>
          <button id="col-live-stop">Live-Teilen beenden</button>
          <button id="col-export">Export als JSON</button>
          <button id="col-import-btn">Import aus JSON</button>
          <button id="col-delete" class="danger">Collection löschen</button>
        </div>
      </div>
    </div>
    <input type="file" id="col-import" accept="application/json,.json" hidden>
  </div>`);

defineTemplate("mtg-filter-controls", `
  <div class="controls collapsed" id="controls">
    <button class="filter-toggle" id="filter-toggle">Filter &amp; Suche ▾</button>
    <div class="filter-groups">
    <div class="control-group">
      <span class="label">Farbe</span>
      <button class="color-btn" data-color="W" title="Weiß">W</button>
      <button class="color-btn" data-color="U" title="Blau">U</button>
      <button class="color-btn" data-color="B" title="Schwarz">B</button>
      <button class="color-btn" data-color="R" title="Rot">R</button>
      <button class="color-btn" data-color="G" title="Grün">G</button>
      <button class="color-btn" data-color="M" title="Mehrfarbig">M</button>
      <button class="color-btn" data-color="C" title="Farblos">C</button>
    </div>
    <div class="control-group">
      <span class="label">Preis €</span>
      <input type="number" id="price-min" min="0" step="0.5" placeholder="min">
      <span style="color:var(--muted)">–</span>
      <input type="number" id="price-max" min="0" step="0.5" placeholder="max">
    </div>
    <div class="control-group">
      <span class="label">Ansicht</span>
      <button class="view-btn" id="view-detail" title="Detailansicht mit Preisen">☰ Details</button>
      <button class="view-btn" id="view-gallery" title="Kompakte Galerie – mehr Karten pro Zeile">▦ Galerie</button>
    </div>
    <div class="control-group">
      <span class="label">Sortierung</span>
      <select id="sort">
        <option value="number">Sammlernummer</option>
        <option value="price-desc">Preis absteigend</option>
        <option value="price-asc">Preis aufsteigend</option>
        <option value="name">Name A–Z</option>
      </select>
    </div>
    <div class="control-group">
      <input type="search" id="search" placeholder="Name, Typ oder Kartentext …">
    </div>
    <div class="control-group">
      <button class="fav-filter-btn" id="fav-filter">★ Nur Favoriten</button>
      <button class="reset-btn" id="reset">Filter zurücksetzen</button>
    </div>
    </div>
  </div>`);

defineTemplate("mtg-status-bar", `<div class="status-bar" id="status"></div>`);

defineTemplate("mtg-compare-bar", `
  <div class="compare-bar" id="compare-bar" hidden>
    <span class="cmp-title" id="compare-title"></span>
    <div class="cmp-chips" id="cmp-chips">
      <button class="cmp-chip active" data-cmp="all">Alle</button>
      <button class="cmp-chip" data-cmp="both">In beiden</button>
      <button class="cmp-chip" data-cmp="onlyA">Nur A</button>
      <button class="cmp-chip" data-cmp="onlyB">Nur B</button>
    </div>
    <button class="bar-btn" id="compare-exit">Vergleich beenden</button>
  </div>`);

defineTemplate("mtg-share-bar", `
  <div class="compare-bar" id="share-bar" hidden>
    <span class="cmp-title" id="share-title"></span>
    <button class="bar-btn primary" id="share-adopt">Als eigene Collection übernehmen</button>
    <button class="bar-btn" id="share-close">Schließen</button>
  </div>`);

defineTemplate("mtg-progress-bar", `
  <div class="progress-wrap" id="progress">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text">Verbinde mit Scryfall …</div>
  </div>`);

(function () {
  // ===== Konstanten =====
  const COLLECTION_API = "https://api.scryfall.com/cards/collection";
  const FUZZY_API = "https://api.scryfall.com/cards/named?fuzzy=";

  const FAV_KEY = "tmt-favorites-v1";
  const COLLECTIONS_KEY = "mtg-collections-v1";
  const CARD_CACHE_KEY = "mtg-card-cache-v2"; // v2: inkl. Typ-/Regel-/Flavor-Text für die Suche
  const ACTIVE_KEY = "mtg-active-collection-v1";
  const VIEW_KEY = "mtg-view-v1";
  const FILTERS_OPEN_KEY = "mtg-filters-open-v1";

  const RARITY_LABEL = { common: "C", uncommon: "U", rare: "R", mythic: "M" };
  const RARITY_NAME = { common: "Common", uncommon: "Uncommon", rare: "Rare", mythic: "Mythic" };

  // ===== Zustand =====
  let cards = [];
  const cardEls = new Map(); // card.id -> <mtg-card>-Element (pro Collection-Ansicht)
  let favorites = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || "[]"));
  const filters = { colors: new Set(), priceMin: null, priceMax: null, sort: "number", search: "", favsOnly: false, compareFilter: "all" };

  let collections = loadJson(COLLECTIONS_KEY, []);
  let cardCache = loadJson(CARD_CACHE_KEY, {}); // scryfallId -> vereinfachte Karte
  localStorage.removeItem("mtg-card-cache-v1"); // alter Cache ohne Textfelder
  let activeId = localStorage.getItem(ACTIVE_KEY);
  if (!collections.some(c => c.id === activeId)) {
    activeId = collections.length ? collections[0].id : null;
  }
  let loadToken = 0; // entwertet laufende Ladevorgänge beim Collection-Wechsel

  let cmInfo = null;
  let pendingCmPrices = null;

  // ===== DOM =====
  const grid = document.getElementById("grid");
  const statusBar = document.getElementById("status");
  const emptyNote = document.getElementById("empty-note");
  const progress = document.getElementById("progress");
  const progressFill = document.getElementById("progress-fill");
  const progressText = document.getElementById("progress-text");
  const colSelect = document.getElementById("collection-select");
  const modalOverlay = document.getElementById("modal-overlay");
  const colStatus = document.getElementById("col-status");

  // ===== Hilfsfunktionen =====
  function loadJson(key, fallback) {
    try {
      const v = JSON.parse(localStorage.getItem(key));
      return v === null || v === undefined ? fallback : v;
    } catch (e) { return fallback; }
  }
  function saveJson(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch (e) { alert("Speichern fehlgeschlagen – der Browser-Speicher ist voll."); }
  }
  function saveFavorites() { saveJson(FAV_KEY, [...favorites]); }
  function saveCollections() { saveJson(COLLECTIONS_KEY, collections); }
  function saveCardCache() { saveJson(CARD_CACHE_KEY, cardCache); }

  function normName(s) {
    return s.toLowerCase().replace(/’/g, "'").trim();
  }

  function cheapestPrice(prices) {
    const vals = [prices.eur, prices.eur_foil]
      .map(parseFloat)
      .filter(v => !isNaN(v));
    return vals.length ? Math.min(...vals) : null;
  }

  function simplify(card) {
    const faces = card.card_faces || [card];
    const img = card.image_uris || (card.card_faces && card.card_faces[0].image_uris) || {};
    return {
      id: card.id,
      name: card.name,
      set: card.set,
      number: card.collector_number,
      numSort: parseInt(card.collector_number, 10) || 0,
      colors: card.colors !== undefined ? card.colors
            : (card.card_faces ? [...new Set(card.card_faces.flatMap(f => f.colors || []))] : []),
      rarity: card.rarity,
      typeLine: card.type_line || faces.map(f => f.type_line).filter(Boolean).join(" // "),
      oracle: faces.map(f => f.oracle_text || "").filter(Boolean).join("\n"),
      flavor: faces.map(f => f.flavor_text || "").filter(Boolean).join("\n"),
      imageSmall: img.small || "",
      image: img.normal || img.large || img.small || "",
      url: card.scryfall_uri,
      cmId: card.cardmarket_id || null,
      cmUrl: (card.purchase_uris && card.purchase_uris.cardmarket) || "",
      price: cheapestPrice(card.prices || {}),
      foilOnly: !(card.prices && card.prices.eur) && !!(card.prices && card.prices.eur_foil),
      trend: null
    };
  }

  // Durchsuchbarer Gesamttext einer Karte (einmal berechnet, dann gemerkt).
  // Funktioniert auch für Karten aus alten Exporten ohne Textfelder.
  function searchTextOf(card) {
    if (!card._search) {
      card._search = normName(
        [card.name, card.typeLine, card.oracle, card.flavor].filter(Boolean).join("\n")
      );
    }
    return card._search;
  }

  function formatEur(v) {
    return v.toLocaleString("de-DE", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
  }

  // Physische Stückzahl einer Collection (nicht nur verschiedene Drucke)
  function countCards(entries) {
    return entries.reduce((s, e) => s + (e.qty || 1), 0);
  }

  // ===== Cardmarket-Preise (prices.json aus dem offiziellen Price Guide) =====
  async function loadCardmarketPrices() {
    try {
      const res = await fetch("prices.json", { cache: "no-store" });
      if (!res.ok) return;
      const data = await res.json();
      if (!data || !data.prices) return;
      cmInfo = { updatedAt: data.updatedAt };
      pendingCmPrices = data.prices;
      for (const card of cards) applyCardmarketPrice(card, data.prices);
      applyFilters();
    } catch (e) { /* nicht erreichbar -> Scryfall-Preise behalten */ }
  }

  function applyCardmarketPrice(card, prices) {
    const p = card.cmId !== null ? prices[String(card.cmId)] : null;
    if (!p) return;
    const lows = [
      { v: p.low, foil: false },
      { v: p.lowFoil, foil: true }
    ].filter(x => typeof x.v === "number");
    if (!lows.length) return;
    const best = lows.reduce((a, b) => (b.v < a.v ? b : a));
    card.price = best.v;
    card.foilOnly = best.foil;
    card.trend = typeof p.trend === "number" ? p.trend : null;
    card.isCm = true;
    const el = cardEls.get(card.id);
    if (el) el.refreshPrice();
  }

  // ===== Laden: Collection =====
  function setProgress(loaded, total) {
    const pct = total ? Math.round((loaded / total) * 100) : 0;
    progressFill.style.width = pct + "%";
    progressText.textContent = "Lade Kartendaten: " + loaded + " / " + (total || "?") + " (" + pct + " %)";
  }
  function showProgress() {
    progress.hidden = false;
    progressFill.style.width = "0%";
    progressText.textContent = "Verbinde mit Scryfall …";
  }

  async function loadCollectionCards(col, token) {
    const have = [];
    const missing = [];
    for (const entry of col.entries) {
      const cached = cardCache[entry.id];
      if (cached) have.push({ ...cached, qty: entry.qty });
      else missing.push(entry);
    }
    setProgress(have.length, col.entries.length);
    if (have.length) addBatch(have, token);
    for (let i = 0; i < missing.length; i += 75) {
      const slice = missing.slice(i, i + 75);
      const res = await fetch(COLLECTION_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifiers: slice.map(e => ({ id: e.id })) })
      });
      if (!res.ok) throw new Error("Scryfall antwortet mit Status " + res.status);
      const json = await res.json();
      if (token !== loadToken) return;
      const qtyById = new Map(slice.map(e => [e.id, e.qty]));
      const batch = json.data.map(c => {
        const s = simplify(c);
        cardCache[c.id] = s;
        return { ...s, qty: qtyById.get(c.id) || 1 };
      });
      saveCardCache();
      addBatch(batch, token);
      setProgress(Math.min(have.length + i + 75, col.entries.length), col.entries.length);
    }
  }

  // Lädt alle Karten einer Collection (Cache zuerst, Rest von Scryfall)
  // und gibt sie gesammelt zurück – für den Vergleich zweier Collections.
  async function getCollectionCards(col) {
    const out = [];
    const missing = [];
    for (const entry of col.entries) {
      const cached = cardCache[entry.id];
      if (cached) out.push({ ...cached, qty: entry.qty });
      else missing.push(entry);
    }
    for (let i = 0; i < missing.length; i += 75) {
      const slice = missing.slice(i, i + 75);
      const res = await fetch(COLLECTION_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifiers: slice.map(e => ({ id: e.id })) })
      });
      if (!res.ok) throw new Error("Scryfall antwortet mit Status " + res.status);
      const json = await res.json();
      const qtyById = new Map(slice.map(e => [e.id, e.qty]));
      for (const c of json.data) {
        const s = simplify(c);
        cardCache[c.id] = s;
        out.push({ ...s, qty: qtyById.get(c.id) || 1 });
      }
    }
    if (missing.length) saveCardCache();
    return out;
  }

  // ===== Vergleich zweier Collections =====
  let compareMode = null; // { a, b } oder null
  const compareBar = document.getElementById("compare-bar");
  const compareOverlay = document.getElementById("compare-overlay");

  // ===== Geteilte Collection anzeigen =====
  // Kodierung der Live-Links: ("1."|"0.") + base64url(deflate(text)),
  // "1." = deflate-komprimiert, "0." = unkomprimiert (Fallback für alte Browser)
  let sharedView = null; // { name, found } oder null
  const shareBar = document.getElementById("share-bar");

  function b64urlEncode(bytes) {
    let s = "";
    for (const b of bytes) s += String.fromCharCode(b);
    return btoa(s).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }
  function b64urlDecode(s) {
    s = s.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    return Uint8Array.from(atob(s), c => c.charCodeAt(0));
  }
  async function compressText(text) {
    const bytes = new TextEncoder().encode(text);
    if (typeof CompressionStream === "undefined") return "0." + b64urlEncode(bytes);
    const stream = new Blob([bytes]).stream().pipeThrough(new CompressionStream("deflate-raw"));
    return "1." + b64urlEncode(new Uint8Array(await new Response(stream).arrayBuffer()));
  }
  async function decompressText(s) {
    const bytes = b64urlDecode(s.slice(2));
    if (s.startsWith("0.")) return new TextDecoder().decode(bytes);
    if (typeof DecompressionStream === "undefined") {
      throw new Error("Dieser Browser kann den Link nicht entpacken (zu alt)");
    }
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
    return await new Response(stream).text();
  }

  function clearShareHash() {
    if (location.hash.startsWith("#live=")) {
      history.replaceState(null, "", location.pathname + location.search);
    }
  }
  function exitShareUi() {
    if (!sharedView) return;
    sharedView = null;
    shareBar.hidden = true;
    clearShareHash();
  }

  function adoptSharedCollection() {
    if (!sharedView) return;
    const entryById = new Map();
    for (const f of sharedView.found) {
      cardCache[f.card.id] = f.card;
      const existing = entryById.get(f.card.id);
      if (existing) existing.qty += f.qty;
      else entryById.set(f.card.id, { id: f.card.id, qty: f.qty });
    }
    saveCardCache();
    const col = {
      id: "c" + Date.now().toString(36),
      name: sharedView.name,
      createdAt: new Date().toISOString(),
      entries: [...entryById.values()]
    };
    collections.push(col);
    saveCollections();
    switchCollection(col.id); // beendet auch die geteilte Ansicht
  }

  // ===== Live-Teilen über kvdb.io =====
  // Der Besitzer legt einmalig einen Speicher-Bucket mit write_key an (nur
  // lokal gespeichert). Geteilte Collections werden bei jeder Änderung
  // hochgeladen. Der Link enthält Bucket und Schlüssel-Name nur als
  // komprimierten, base64-kodierten Blob – nicht im Klartext.
  const LIVE_KEY = "mtg-live-store-v1";
  const KVDB_URL = "https://kvdb.io";
  let liveStore = loadJson(LIVE_KEY, null); // { bucket, writeKey, secretKey, shares: {colId: kvKey} }

  function saveLiveStore() { saveJson(LIVE_KEY, liveStore); }

  function randomToken(len) {
    const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const buf = new Uint32Array(len);
    crypto.getRandomValues(buf);
    let s = "";
    for (const v of buf) s += chars[v % chars.length];
    return s;
  }

  async function ensureLiveBucket() {
    if (liveStore && liveStore.bucket) return;
    // kvdb.io verlangt beim Anlegen eine E-Mail-Adresse, prüft sie aber
    // nicht. Wir senden eine generierte Adresse der reservierten
    // Beispiel-Domain – der Zugriff hängt allein an den lokalen Schlüsseln.
    const email = "mtg-" + randomToken(12).toLowerCase() + "@example.org";
    const writeKey = randomToken(24);
    const secretKey = randomToken(24);
    const res = await fetch(KVDB_URL, {
      method: "POST",
      body: new URLSearchParams({ email: email.trim(), write_key: writeKey, secret_key: secretKey })
    });
    const bucket = (await res.text()).trim();
    if (!res.ok || !/^[A-Za-z0-9]{10,}$/.test(bucket)) {
      throw new Error("Live-Speicher konnte nicht angelegt werden: " + bucket);
    }
    liveStore = { bucket: bucket, writeKey: writeKey, secretKey: secretKey, shares: {} };
    saveLiveStore();
    // Keys dauerhaft halten (Best Effort)
    fetch(KVDB_URL + "/" + bucket, {
      method: "PATCH",
      headers: { Authorization: "Basic " + btoa(secretKey + ":") },
      body: new URLSearchParams({ default_ttl: "0" })
    }).catch(() => {});
  }

  async function pushLiveCollection(col) {
    if (!liveStore || !liveStore.shares[col.id]) return;
    const colCards = await getCollectionCards(col);
    const payload = {
      v: 1,
      name: col.name,
      updatedAt: new Date().toISOString(),
      cards: colCards.map(c => [c.set, c.number, c.qty || 1])
    };
    const res = await fetch(KVDB_URL + "/" + liveStore.bucket + "/" + liveStore.shares[col.id], {
      method: "PUT",
      headers: { Authorization: "Basic " + btoa(liveStore.writeKey + ":") },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error("Hochladen fehlgeschlagen (Status " + res.status + ")");
  }

  // Nach Änderungen an einer live geteilten Collection aufrufen
  function syncLiveShare(col) {
    if (col && liveStore && liveStore.shares[col.id]) {
      pushLiveCollection(col).catch(() => { /* nächster Push versucht es erneut */ });
    }
  }

  async function shareLiveCollection() {
    const col = currentCollection();
    if (!col) return;
    try {
      await ensureLiveBucket();
      if (!liveStore.shares[col.id]) {
        liveStore.shares[col.id] = randomToken(12);
        saveLiveStore();
        renderCollectionSelect();
      }
      await pushLiveCollection(col);
      const blob = await compressText("kv|" + liveStore.bucket + "|" + liveStore.shares[col.id]);
      const url = location.origin + location.pathname + "#live=" + blob;
      if (navigator.share) {
        await navigator.share({ title: col.name, url: url });
      } else {
        await navigator.clipboard.writeText(url);
        alert("Der Live-Link wurde in die Zwischenablage kopiert.\n" +
          "Änderungen an dieser Collection werden ab jetzt automatisch hochgeladen.");
      }
    } catch (e) {
      if (e.name !== "AbortError") alert("Live-Teilen fehlgeschlagen: " + e.message);
    }
  }

  function removeLiveShare(colId) {
    if (!liveStore || !liveStore.shares[colId]) return;
    const kvKey = liveStore.shares[colId];
    delete liveStore.shares[colId];
    saveLiveStore();
    fetch(KVDB_URL + "/" + liveStore.bucket + "/" + kvKey, {
      method: "DELETE",
      headers: { Authorization: "Basic " + btoa(liveStore.writeKey + ":") }
    }).catch(() => {});
  }

  function stopLiveShare() {
    const col = currentCollection();
    if (!col || !liveStore || !liveStore.shares[col.id]) return;
    removeLiveShare(col.id);
    renderCollectionSelect();
    alert("Live-Teilen beendet – bestehende Links zeigen die Collection nicht mehr an.");
  }

  // Liest "#live=…" aus der URL, holt den aktuellen Stand vom Speicher
  // und zeigt ihn schreibgeschützt an. Tab-Reload lädt immer frisch.
  async function openLiveFromHash() {
    const m = location.hash.match(/^#live=(.+)$/);
    if (!m) return false;
    try {
      const text = await decompressText(decodeURIComponent(m[1]));
      const parts = text.split("|");
      if (parts[0] !== "kv" || !parts[1] || !parts[2]) throw new Error("Ungültiger Link");
      loadToken++;
      const token = loadToken;
      cards = [];
      cardEls.clear();
      grid.replaceChildren();
      emptyNote.hidden = true;
      showProgress();
      progressText.textContent = "Lade geteilte Collection …";
      const res = await fetch(KVDB_URL + "/" + parts[1] + "/" + parts[2], { cache: "no-store" });
      if (res.status === 404) throw new Error("Diese Collection wird nicht mehr geteilt");
      if (!res.ok) throw new Error("Speicher antwortet mit Status " + res.status);
      const payload = await res.json();
      const entries = (payload.cards || []).map(c => ({
        qty: parseInt(c[2], 10) || 1,
        ident: { set: String(c[0]), collector_number: String(c[1]) },
        raw: c[0] + " " + c[1]
      }));
      if (!entries.length) throw new Error("Die geteilte Collection ist leer");
      const { found } = await resolveEntries(entries, t => { progressText.textContent = t; });
      if (token !== loadToken) return true;
      if (!found.length) throw new Error("Keine der Karten konnte geladen werden");
      sharedView = { name: payload.name || "Geteilte Collection", found: found };
      const stand = payload.updatedAt ? new Date(payload.updatedAt).toLocaleString("de-DE") : "";
      document.getElementById("share-title").textContent =
        "Live geteilt: „" + sharedView.name + "“ (" + found.length + " Karten" +
        (stand ? " · Stand " + stand : "") + ")";
      shareBar.hidden = false;
      addBatch(found.map(f => ({ ...f.card, qty: f.qty })), token);
      progress.hidden = true;
      return true;
    } catch (e) {
      alert("Der Live-Link konnte nicht geladen werden: " + e.message);
      clearShareHash();
      return false;
    }
  }

  function exitCompareUi() {
    compareMode = null;
    filters.compareFilter = "all";
    compareBar.hidden = true;
    document.querySelectorAll(".cmp-chip").forEach(ch =>
      ch.classList.toggle("active", ch.dataset.cmp === "all"));
  }

  function openCompareDialog() {
    const a = currentCollection();
    if (!a || collections.length < 2) return;
    const sel = document.getElementById("compare-select");
    sel.innerHTML = "";
    for (const c of collections) {
      if (c.id === a.id) continue;
      const opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = c.name + " (" + countCards(c.entries) + " Karten)";
      sel.appendChild(opt);
    }
    document.getElementById("compare-hint").textContent =
      "„" + a.name + "“ vergleichen mit:";
    compareOverlay.hidden = false;
  }

  async function startCompare(bId) {
    const a = currentCollection();
    const b = collections.find(c => c.id === bId);
    if (!a || !b) return;
    compareOverlay.hidden = true;
    loadToken++;
    const token = loadToken;
    cards = [];
    cardEls.clear();
    grid.replaceChildren();
    emptyNote.hidden = true;
    showProgress();
    progressText.textContent = "Lade beide Collections …";
    try {
      const [aCards, bCards] = await Promise.all([getCollectionCards(a), getCollectionCards(b)]);
      if (token !== loadToken) return;
      // Verglichen wird über den Kartennamen (verschiedene Drucke zählen zusammen)
      const byName = new Map();
      for (const c of aCards) {
        const key = normName(c.name);
        const e = byName.get(key);
        if (e) e.qtyA += c.qty || 1;
        else byName.set(key, { card: c, qtyA: c.qty || 1, qtyB: 0 });
      }
      for (const c of bCards) {
        const key = normName(c.name);
        const e = byName.get(key);
        if (e) e.qtyB += c.qty || 1;
        else byName.set(key, { card: c, qtyA: 0, qtyB: c.qty || 1 });
      }
      const list = [...byName.values()].map(e => ({
        ...e.card,
        qty: e.qtyA + e.qtyB,
        compare: {
          a: e.qtyA,
          b: e.qtyB,
          state: e.qtyA && e.qtyB ? "both" : (e.qtyA ? "onlyA" : "onlyB")
        }
      }));
      compareMode = { a, b };
      filters.compareFilter = "all";
      const counts = { both: 0, onlyA: 0, onlyB: 0 };
      for (const c of list) counts[c.compare.state]++;
      document.getElementById("compare-title").textContent =
        "Vergleich: „" + a.name + "“ ↔ „" + b.name + "“";
      const chipLabels = {
        all: "Alle (" + list.length + ")",
        both: "In beiden (" + counts.both + ")",
        onlyA: "Nur " + shortName(a.name, 14) + " (" + counts.onlyA + ")",
        onlyB: "Nur " + shortName(b.name, 14) + " (" + counts.onlyB + ")"
      };
      document.querySelectorAll(".cmp-chip").forEach(ch => {
        ch.textContent = chipLabels[ch.dataset.cmp];
        ch.classList.toggle("active", ch.dataset.cmp === "all");
      });
      compareBar.hidden = false;
      addBatch(list, token);
      progress.hidden = true;
    } catch (err) {
      if (token !== loadToken) return;
      progress.hidden = true;
      emptyNote.textContent = "Vergleich fehlgeschlagen: " + err.message;
      emptyNote.hidden = false;
    }
  }

  function shortName(s, n) {
    return s.length > n ? s.slice(0, n - 1) + "…" : s;
  }

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function cmpBadgeLabel(cmp) {
    const a = escapeHtml(shortName(compareMode.a.name, 10));
    const b = escapeHtml(shortName(compareMode.b.name, 10));
    if (cmp.state === "both") return a + " " + cmp.a + "× · " + b + " " + cmp.b + "×";
    if (cmp.state === "onlyA") return "nur " + a + (cmp.a > 1 ? " (" + cmp.a + "×)" : "");
    return "nur " + b + (cmp.b > 1 ? " (" + cmp.b + "×)" : "");
  }

  // ===== Collection-Verwaltung =====
  function currentCollection() {
    return collections.find(c => c.id === activeId) || null;
  }

  function renderCollectionSelect() {
    colSelect.innerHTML = "";
    if (!collections.length) {
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "– noch keine Collection –";
      colSelect.appendChild(opt);
    }
    for (const col of collections) {
      const opt = document.createElement("option");
      opt.value = col.id;
      opt.textContent = col.name + " (" + countCards(col.entries) + " Karten)";
      colSelect.appendChild(opt);
    }
    colSelect.value = activeId || "";
    const none = !currentCollection();
    document.getElementById("col-delete").disabled = none;
    document.getElementById("col-export").disabled = none;
    document.getElementById("col-add").disabled = none;
    document.getElementById("col-compare").disabled = none || collections.length < 2;
    document.getElementById("col-rename").disabled = none;
    document.getElementById("col-live").disabled = none;
    document.getElementById("col-live-stop").disabled =
      none || !liveStore || !liveStore.shares[activeId];
  }

  function switchCollection(id) {
    exitCompareUi();
    exitShareUi();
    activeId = id;
    if (id) localStorage.setItem(ACTIVE_KEY, id);
    else localStorage.removeItem(ACTIVE_KEY);
    renderCollectionSelect();
    loadToken++;
    const token = loadToken;
    cards = [];
    cardEls.clear();
    grid.replaceChildren();
    const col = currentCollection();
    if (!col) {
      progress.hidden = true;
      emptyNote.innerHTML = 'Noch keine Collection vorhanden. ' +
        '<br><br><button class="bar-btn primary" id="empty-cta">+ Neue Collection anlegen</button>';
      document.getElementById("empty-cta").addEventListener("click", () => openModal("create"));
      emptyNote.hidden = false;
      updateStatus(0, 0, 0);
      return;
    }
    emptyNote.textContent = "Keine Karten gefunden – Filter anpassen.";
    emptyNote.hidden = true;
    showProgress();
    updateStatus(0, 0, 0);
    loadCollectionCards(col, token)
      .then(() => { if (token === loadToken) progress.hidden = true; })
      .catch(err => {
        if (token !== loadToken) return;
        progress.hidden = true;
        const box = document.createElement("div");
        box.className = "error-box";
        box.innerHTML = "Karten konnten nicht geladen werden:<br><strong>" + err.message +
          "</strong><br><button onclick=\"location.reload()\">Erneut versuchen</button>";
        grid.before(box);
      });
  }

  function renameCurrentCollection() {
    const col = currentCollection();
    if (!col) return;
    const name = prompt("Neuer Name für die Collection:", col.name);
    if (name === null) return;
    const trimmed = name.trim();
    if (!trimmed) return;
    col.name = trimmed;
    saveCollections();
    renderCollectionSelect();
    syncLiveShare(col); // Name steckt auch im Live-Share-Datensatz
  }

  function deleteCurrentCollection() {
    const col = currentCollection();
    if (!col) return;
    if (!confirm('Collection "' + col.name + '" wirklich löschen?')) return;
    removeLiveShare(col.id); // ggf. Live-Teilen mit beenden
    collections = collections.filter(c => c.id !== col.id);
    saveCollections();
    switchCollection(collections.length ? collections[0].id : null);
  }

  function exportCurrentCollection() {
    const col = currentCollection();
    if (!col) return;
    const name = col.name;
    const data = {
      format: "mtg-collection-v1",
      name: name,
      exportedAt: new Date().toISOString(),
      cards: cards.map(c => ({ qty: c.qty || 1, card: { ...c, qty: undefined } }))
    };
    const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name.replace(/[^\wäöüÄÖÜß -]/g, "_") + ".json";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function importCollectionFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.format !== "mtg-collection-v1" || !Array.isArray(data.cards)) {
          throw new Error("Kein gültiges Collection-Export-Format");
        }
        const entries = [];
        for (const item of data.cards) {
          if (!item.card || !item.card.id) continue;
          cardCache[item.card.id] = item.card;
          entries.push({ id: item.card.id, qty: item.qty || 1 });
        }
        if (!entries.length) throw new Error("Die Datei enthält keine Karten");
        saveCardCache();
        const col = {
          id: "c" + Date.now().toString(36),
          name: data.name || file.name.replace(/\.json$/i, ""),
          createdAt: new Date().toISOString(),
          entries: entries
        };
        collections.push(col);
        saveCollections();
        switchCollection(col.id);
      } catch (e) {
        alert("Import fehlgeschlagen: " + e.message);
      }
    };
    reader.readAsText(file);
  }

  // ===== Listen-Parser =====
  function cleanName(s) {
    return s
      .replace(/\s*[*([]F[*)\]]\s*$/i, "")   // Foil-Markierungen *F* (F) [F]
      .replace(/\s+#.*$/, "")                  // Kommentare nach #
      .trim();
  }

  function parseList(text, setHint) {
    const merged = new Map(); // key -> {qty, ident, raw}
    const errors = [];
    function add(key, qty, ident, raw) {
      const existing = merged.get(key);
      if (existing) existing.qty += qty;
      else merged.set(key, { qty, ident, raw });
    }
    for (const rawLine of text.split("\n")) {
      let line = rawLine.trim();
      if (!line || line.startsWith("//") || line.startsWith("#")) continue;
      line = line.replace(/^[-*]\s*\[[ xX]\]\s*/, "").replace(/^[-*]\s+/, "").trim();
      if (!line) continue;
      let m;
      // Arena/Moxfield: "1 Name (SET) 123" (Sammlernummer optional)
      if ((m = line.match(/^(\d{1,3})[xX]?\s+(.+?)\s+\(([A-Za-z0-9]{2,6})\)\s+([A-Za-z0-9★†-]+)\s*.*$/))) {
        const set = m[3].toLowerCase();
        add("n:" + set + ":" + m[4], parseInt(m[1], 10), { set: set, collector_number: m[4] }, rawLine);
        continue;
      }
      if ((m = line.match(/^(\d{1,3})[xX]?\s+(.+?)\s+\(([A-Za-z0-9]{2,6})\)\s*$/))) {
        const set = m[3].toLowerCase();
        const name = cleanName(m[2]);
        add("m:" + normName(name) + "|" + set, parseInt(m[1], 10), { name: name, set: set }, rawLine);
        continue;
      }
      // Set-Liste mit Sammlernummer: "0017 Name ..." (Set-Code nötig)
      if ((m = line.match(/^(\d{1,4})\s+(.+)$/)) && (m[1].length >= 3 || m[1][0] === "0")) {
        if (setHint) {
          const num = String(parseInt(m[1], 10));
          add("n:" + setHint + ":" + num, 1, { set: setHint, collector_number: num }, rawLine);
        } else {
          errors.push(rawLine + "   → Sammlernummer erkannt, aber kein Set-Code angegeben");
        }
        continue;
      }
      // "4x Name" / "4 Name"
      if ((m = line.match(/^(\d{1,3})[xX]?\s+(.+)$/))) {
        const name = cleanName(m[2]);
        add("m:" + normName(name), parseInt(m[1], 10), { name: name }, rawLine);
        continue;
      }
      // Nur der Kartenname
      const name = cleanName(line);
      if (name) add("m:" + normName(name), 1, { name: name }, rawLine);
    }
    return { entries: [...merged.values()], errors };
  }

  // ===== Auflösung über Scryfall =====
  async function resolveEntries(entries, onStatus) {
    const found = [];
    const unresolved = [];
    const fuzzyQueue = [];

    for (let i = 0; i < entries.length; i += 75) {
      const batch = entries.slice(i, i + 75);
      onStatus("Löse Karten auf … " + Math.min(i + 75, entries.length) + " / " + entries.length);
      const res = await fetch(COLLECTION_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifiers: batch.map(e => e.ident) })
      });
      if (!res.ok) throw new Error("Scryfall antwortet mit Status " + res.status);
      const json = await res.json();

      const bySetNum = new Map();
      const byName = new Map();
      for (const e of batch) {
        if (e.ident.collector_number) {
          bySetNum.set(e.ident.set + ":" + e.ident.collector_number.toLowerCase(), e);
        } else {
          const n = normName(e.ident.name);
          if (e.ident.set) byName.set(n + "|" + e.ident.set, e);
          byName.set(n, e);
        }
      }
      const matched = new Set();
      for (const card of json.data) {
        let e = bySetNum.get(card.set + ":" + card.collector_number.toLowerCase());
        if (!e || matched.has(e)) {
          e = null;
          const names = [normName(card.name), normName(card.name.split(" // ")[0])];
          for (const n of names) {
            const cand = byName.get(n + "|" + card.set) || byName.get(n);
            if (cand && !matched.has(cand)) { e = cand; break; }
          }
        }
        if (e && !matched.has(e)) {
          matched.add(e);
          found.push({ card: simplify(card), qty: e.qty });
        }
      }
      for (const e of batch) {
        if (matched.has(e)) continue;
        if (e.ident.name) fuzzyQueue.push(e);
        else unresolved.push(e.raw);
      }
    }

    for (const e of fuzzyQueue) {
      onStatus("Unscharfe Suche: " + e.ident.name + " …");
      try {
        const res = await fetch(FUZZY_API + encodeURIComponent(e.ident.name));
        if (res.ok) found.push({ card: simplify(await res.json()), qty: e.qty });
        else unresolved.push(e.raw);
      } catch (err) { unresolved.push(e.raw); }
      await new Promise(r => setTimeout(r, 120)); // API schonen
    }
    return { found, unresolved };
  }

  // ===== Modal: Collection anlegen / Karten hinzufügen =====
  let modalMode = "create";

  function openModal(mode) {
    modalMode = mode === "add" ? "add" : "create";
    const isAdd = modalMode === "add";
    document.getElementById("modal-title").textContent = isAdd
      ? "Karten hinzufügen zu „" + currentCollection().name + "“"
      : "Neue Collection anlegen";
    document.getElementById("col-name-wrap").style.display = isAdd ? "none" : "";
    document.getElementById("col-create").textContent = isAdd ? "Karten hinzufügen" : "Collection erstellen";
    document.getElementById("col-name").value = "";
    document.getElementById("col-set").value = "";
    document.getElementById("col-list").value = "";
    colStatus.innerHTML = "";
    document.getElementById("col-create").disabled = false;
    modalOverlay.hidden = false;
    (isAdd ? document.getElementById("col-list") : document.getElementById("col-name")).focus();
  }
  function closeModal() { modalOverlay.hidden = true; }

  async function handleModalSubmit() {
    const isAdd = modalMode === "add";
    const name = document.getElementById("col-name").value.trim();
    const setHint = document.getElementById("col-set").value.trim().toLowerCase();
    const text = document.getElementById("col-list").value;
    if (!isAdd && !name) { colStatus.innerHTML = '<span class="warn">Bitte einen Namen angeben.</span>'; return; }
    if (!text.trim()) { colStatus.innerHTML = '<span class="warn">Bitte eine Kartenliste einfügen.</span>'; return; }

    const { entries, errors } = parseList(text, setHint || null);
    if (!entries.length) {
      colStatus.innerHTML = '<span class="warn">Keine gültigen Zeilen erkannt.</span>' +
        (errors.length ? "\n" + errors.join("\n") : "");
      return;
    }

    const createBtn = document.getElementById("col-create");
    createBtn.disabled = true;
    try {
      const { found, unresolved } = await resolveEntries(entries, t => { colStatus.textContent = t; });
      if (!found.length) {
        colStatus.innerHTML = '<span class="warn">Keine der Karten konnte aufgelöst werden.</span>\n' +
          unresolved.concat(errors).join("\n");
        createBtn.disabled = false;
        return;
      }
      let col;
      if (isAdd) {
        col = currentCollection();
        const byId = new Map(col.entries.map(e => [e.id, e]));
        for (const f of found) {
          cardCache[f.card.id] = f.card;
          const existing = byId.get(f.card.id);
          if (existing) existing.qty += f.qty;
          else {
            const entry = { id: f.card.id, qty: f.qty };
            col.entries.push(entry);
            byId.set(f.card.id, entry);
          }
        }
        saveCardCache();
        saveCollections();
        switchCollection(col.id); // Ansicht mit neuen Karten neu aufbauen
        syncLiveShare(col);
      } else {
        // Duplikate (gleiche Karte über mehrere Zeilen) zusammenführen
        const entryById = new Map();
        for (const f of found) {
          cardCache[f.card.id] = f.card;
          const existing = entryById.get(f.card.id);
          if (existing) existing.qty += f.qty;
          else entryById.set(f.card.id, { id: f.card.id, qty: f.qty });
        }
        saveCardCache();
        col = {
          id: "c" + Date.now().toString(36),
          name: name,
          createdAt: new Date().toISOString(),
          entries: [...entryById.values()]
        };
        collections.push(col);
        saveCollections();
        switchCollection(col.id);
      }

      const problems = unresolved.concat(errors);
      if (problems.length) {
        colStatus.innerHTML = '<span class="ok">' + found.reduce((s, f) => s + f.qty, 0) +
          ' Karten (' + found.length + ' verschiedene Drucke) übernommen.</span>' +
          '\n<span class="warn">Nicht zugeordnet (' + problems.length + " Zeilen):</span>\n" +
          problems.join("\n");
        createBtn.disabled = false;
      } else {
        closeModal();
      }
    } catch (err) {
      colStatus.innerHTML = '<span class="warn">Fehler: ' + err.message + "</span>";
      createBtn.disabled = false;
    }
  }

  // ===== Darstellung =====
  function priceHtml(card) {
    let html;
    if (card.price === null) {
      html = '<span class="price unknown">kein Preis verfügbar</span>';
    } else {
      const prefix = card.isCm ? "ab " : "";
      const foil = card.foilOnly ? " <small>(Foil)</small>" : "";
      const trend = card.trend !== null
        ? " <small>· Trend " + formatEur(card.trend) + "</small>"
        : "";
      html = '<span class="price">' + prefix + formatEur(card.price) + foil + trend + "</span>";
    }
    if (card.cmUrl) {
      html += '<a class="cm-link" href="' + card.cmUrl + '" target="_blank" rel="noopener"' +
        ' title="Angebote auf Cardmarket ansehen (dort nach Sprache und Zustand filterbar)">Cardmarket ↗</a>';
    }
    return html;
  }

  // ---- Komponente: eine einzelne Kartenkachel ----
  // Das Element ist selbst die Grid-Kachel (Klasse "card"), kapselt sein
  // Rendering und die Favoriten-Interaktion und bietet kleine Methoden,
  // mit denen der Controller Preis, Sichtbarkeit und Reihenfolge steuert,
  // ohne die <img>-Elemente neu zu erzeugen.
  class MtgCard extends HTMLElement {
    set card(data) { this._card = data; if (this.isConnected) this.render(); }
    get card() { return this._card; }

    connectedCallback() {
      if (!this._rendered) this.render();
    }

    render() {
      const card = this._card;
      if (!card) return;
      this.classList.add("card");
      this.innerHTML =
        '<a class="img-link" href="' + card.url + '" target="_blank" rel="noopener" title="' +
          card.name.replace(/"/g, "&quot;") + '">' +
          '<img loading="lazy" decoding="async"' +
          ' src="' + card.image + '"' +
          (card.imageSmall ? ' srcset="' + card.imageSmall + ' 146w, ' + card.image + ' 488w" sizes="(max-width: 600px) 45vw, 240px"' : "") +
          ' alt="' + card.name.replace(/"/g, "&quot;") + '">' +
        "</a>" +
        (card.compare
          ? '<div class="cmp-badge ' + card.compare.state + '">' + cmpBadgeLabel(card.compare) + "</div>"
          : (card.qty > 1 ? '<div class="qty-badge">' + card.qty + "×</div>" : "")) +
        '<div class="info">' +
          '<div class="name-row">' +
            '<div class="name">' + card.name + "</div>" +
            '<button class="fav-btn' + (favorites.has(card.id) ? " faved" : "") +
              '" title="Als Favorit markieren" aria-label="Als Favorit markieren" aria-pressed="' +
              favorites.has(card.id) + '">' +
              (favorites.has(card.id) ? "★" : "☆") +
            "</button>" +
          "</div>" +
          '<div class="meta">' + card.set.toUpperCase() + " #" + card.number +
            ' · <span class="rarity-' + (RARITY_LABEL[card.rarity] || "C") + '">' +
            (RARITY_NAME[card.rarity] || card.rarity) + "</span></div>" +
          '<div class="price-line">' + priceHtml(card) + "</div>" +
        "</div>";
      this.querySelector(".fav-btn").addEventListener("click", () => this.toggleFav());
      this._rendered = true;
    }

    toggleFav() {
      const card = this._card;
      const btn = this.querySelector(".fav-btn");
      if (favorites.has(card.id)) {
        favorites.delete(card.id);
        btn.classList.remove("faved");
        btn.textContent = "☆";
        btn.setAttribute("aria-pressed", "false");
      } else {
        favorites.add(card.id);
        btn.classList.add("faved");
        btn.textContent = "★";
        btn.setAttribute("aria-pressed", "true");
      }
      saveFavorites();
      applyFilters();
    }

    refreshPrice() {
      const line = this.querySelector(".price-line");
      if (line) line.innerHTML = priceHtml(this._card);
    }

    setFiltered(hidden) { this.classList.toggle("filtered-out", hidden); }
    setOrder(n) { this.style.order = n; }
  }
  customElements.define("mtg-card", MtgCard);

  function buildCardEl(card) {
    const el = document.createElement("mtg-card");
    el.card = card;
    return el;
  }

  function matchesColorFilter(card) {
    if (filters.colors.size === 0) return true;
    const isMulti = card.colors.length > 1;
    const isColorless = card.colors.length === 0;
    for (const c of filters.colors) {
      if (c === "M" && isMulti) return true;
      if (c === "C" && isColorless) return true;
      if (card.colors.includes(c)) return true;
    }
    return false;
  }

  function matchesFilters(card) {
    if (compareMode && filters.compareFilter !== "all" &&
        card.compare && card.compare.state !== filters.compareFilter) return false;
    if (!matchesColorFilter(card)) return false;
    if (filters.favsOnly && !favorites.has(card.id)) return false;
    if (filters.search && !searchTextOf(card).includes(filters.search)) return false;
    if (filters.priceMin !== null && (card.price === null || card.price < filters.priceMin)) return false;
    if (filters.priceMax !== null && (card.price === null || card.price > filters.priceMax)) return false;
    return true;
  }

  function sortedCards() {
    const list = [...cards];
    const noPrice = v => v.price === null;
    switch (filters.sort) {
      case "price-asc":
        list.sort((a, b) => noPrice(a) - noPrice(b) || (a.price ?? 0) - (b.price ?? 0) || a.numSort - b.numSort);
        break;
      case "price-desc":
        list.sort((a, b) => noPrice(a) - noPrice(b) || (b.price ?? 0) - (a.price ?? 0) || a.numSort - b.numSort);
        break;
      case "name":
        list.sort((a, b) => a.name.localeCompare(b.name, "de") || a.numSort - b.numSort);
        break;
      default:
        list.sort((a, b) => a.set.localeCompare(b.set) || a.numSort - b.numSort);
    }
    return list;
  }

  function updateStatus(visibleQty, totalQty, totalValue) {
    let text = visibleQty + " von " + totalQty + " Karten";
    if (totalValue > 0 && !compareMode) text += " · Wert: " + formatEur(totalValue);
    text += " · " + favorites.size + " Favoriten";
    if (cmInfo) {
      text += " · Cardmarket-Preise: Stand " + new Date(cmInfo.updatedAt).toLocaleDateString("de-DE");
    } else {
      text += " · Preise: Scryfall (Cardmarket-Trend)";
    }
    statusBar.textContent = text;
  }

  // Sichtbarkeit & Reihenfolge per CSS steuern statt das DOM neu zu bauen –
  // so werden die <img>-Elemente nie neu erzeugt.
  function applyFilters() {
    let visible = 0;
    let value = 0;
    let visibleQty = 0;
    let totalQty = 0;
    for (const [i, card] of sortedCards().entries()) {
      const el = cardEls.get(card.id);
      if (!el) continue;
      const qty = card.qty || 1;
      totalQty += qty;
      const show = matchesFilters(card);
      el.setFiltered(!show);
      el.setOrder(i);
      if (show) {
        visible++;
        visibleQty += qty;
        if (card.price !== null) value += card.price * qty;
      }
    }
    // Ohne Collection bleibt der Hinweis mit CTA sichtbar
    emptyNote.hidden = visible > 0 || (cards.length === 0 && !!currentCollection());
    updateStatus(visibleQty, totalQty, value);
    updateFilterToggle();
  }

  function activeFilterCount() {
    return filters.colors.size +
      (filters.priceMin !== null ? 1 : 0) +
      (filters.priceMax !== null ? 1 : 0) +
      (filters.search ? 1 : 0) +
      (filters.favsOnly ? 1 : 0) +
      (filters.sort !== "number" ? 1 : 0);
  }

  function updateFilterToggle() {
    const open = !controlsEl.classList.contains("collapsed");
    const n = activeFilterCount();
    filterToggle.textContent = (open ? "Filter ausblenden ▴" : "Filter & Suche ▾") +
      (n ? " (" + n + " aktiv)" : "");
  }

  function addBatch(batch, token) {
    if (token !== loadToken) return;
    const frag = document.createDocumentFragment();
    for (const card of batch) {
      if (cardEls.has(card.id)) continue;
      cards.push(card);
      if (pendingCmPrices) applyCardmarketPrice(card, pendingCmPrices);
      const el = buildCardEl(card);
      cardEls.set(card.id, el);
      frag.appendChild(el);
    }
    grid.appendChild(frag);
    applyFilters();
  }

  // ===== Steuerelemente verdrahten =====
  const controlsEl = document.getElementById("controls");
  const filterToggle = document.getElementById("filter-toggle");
  if (localStorage.getItem(FILTERS_OPEN_KEY) === "1") controlsEl.classList.remove("collapsed");
  filterToggle.addEventListener("click", () => {
    const collapsed = controlsEl.classList.toggle("collapsed");
    localStorage.setItem(FILTERS_OPEN_KEY, collapsed ? "0" : "1");
    updateFilterToggle();
  });

  document.querySelectorAll(".color-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const c = btn.dataset.color;
      if (filters.colors.has(c)) { filters.colors.delete(c); btn.classList.remove("active"); }
      else { filters.colors.add(c); btn.classList.add("active"); }
      applyFilters();
    });
  });
  document.getElementById("price-min").addEventListener("input", e => {
    filters.priceMin = e.target.value === "" ? null : parseFloat(e.target.value);
    applyFilters();
  });
  document.getElementById("price-max").addEventListener("input", e => {
    filters.priceMax = e.target.value === "" ? null : parseFloat(e.target.value);
    applyFilters();
  });
  document.getElementById("sort").addEventListener("change", e => {
    filters.sort = e.target.value;
    applyFilters();
  });
  let searchTimer = null;
  document.getElementById("search").addEventListener("input", e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      filters.search = normName(e.target.value);
      applyFilters();
    }, 150);
  });
  document.getElementById("fav-filter").addEventListener("click", e => {
    filters.favsOnly = !filters.favsOnly;
    e.currentTarget.classList.toggle("active", filters.favsOnly);
    applyFilters();
  });
  document.getElementById("reset").addEventListener("click", () => {
    filters.colors.clear();
    filters.priceMin = filters.priceMax = null;
    filters.sort = "number";
    filters.search = "";
    filters.favsOnly = false;
    document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("price-min").value = "";
    document.getElementById("price-max").value = "";
    document.getElementById("sort").value = "number";
    document.getElementById("search").value = "";
    document.getElementById("fav-filter").classList.remove("active");
    applyFilters();
  });

  let view = localStorage.getItem(VIEW_KEY) === "gallery" ? "gallery" : "detail";
  function applyView() {
    grid.classList.toggle("gallery", view === "gallery");
    document.getElementById("view-detail").classList.toggle("active", view === "detail");
    document.getElementById("view-gallery").classList.toggle("active", view === "gallery");
  }
  document.getElementById("view-detail").addEventListener("click", () => {
    view = "detail";
    localStorage.setItem(VIEW_KEY, view);
    applyView();
  });
  document.getElementById("view-gallery").addEventListener("click", () => {
    view = "gallery";
    localStorage.setItem(VIEW_KEY, view);
    applyView();
  });

  colSelect.addEventListener("change", e => { if (e.target.value) switchCollection(e.target.value); });
  document.getElementById("col-new").addEventListener("click", () => openModal("create"));
  document.getElementById("col-add").addEventListener("click", () => {
    if (currentCollection()) openModal("add");
  });
  document.getElementById("col-cancel").addEventListener("click", closeModal);
  document.getElementById("col-create").addEventListener("click", handleModalSubmit);
  document.getElementById("col-delete").addEventListener("click", () => { closeMoreMenu(); deleteCurrentCollection(); });
  document.getElementById("col-rename").addEventListener("click", () => { closeMoreMenu(); renameCurrentCollection(); });
  document.getElementById("col-live").addEventListener("click", () => { closeMoreMenu(); shareLiveCollection(); });
  document.getElementById("col-live-stop").addEventListener("click", () => { closeMoreMenu(); stopLiveShare(); });
  document.getElementById("col-export").addEventListener("click", () => { closeMoreMenu(); exportCurrentCollection(); });
  document.getElementById("col-import-btn").addEventListener("click", () => {
    closeMoreMenu();
    document.getElementById("col-import").click();
  });
  document.getElementById("col-import").addEventListener("change", e => {
    if (e.target.files[0]) importCollectionFile(e.target.files[0]);
    e.target.value = "";
  });

  // ⋯-Menü
  const moreBtn = document.getElementById("col-more");
  const moreMenu = document.getElementById("more-menu");
  function closeMoreMenu() {
    moreMenu.hidden = true;
    moreBtn.setAttribute("aria-expanded", "false");
  }
  moreBtn.addEventListener("click", e => {
    e.stopPropagation();
    moreMenu.hidden = !moreMenu.hidden;
    moreBtn.setAttribute("aria-expanded", String(!moreMenu.hidden));
  });
  document.addEventListener("click", e => {
    if (!moreMenu.hidden && !moreMenu.contains(e.target) && e.target !== moreBtn) closeMoreMenu();
  });

  // Vergleich
  document.getElementById("col-compare").addEventListener("click", openCompareDialog);
  document.getElementById("compare-cancel").addEventListener("click", () => { compareOverlay.hidden = true; });
  document.getElementById("compare-start").addEventListener("click", () => {
    const v = document.getElementById("compare-select").value;
    if (v) startCompare(v);
  });
  document.getElementById("compare-exit").addEventListener("click", () => switchCollection(activeId));
  document.getElementById("share-adopt").addEventListener("click", adoptSharedCollection);
  document.getElementById("share-close").addEventListener("click", () => switchCollection(activeId));
  document.querySelectorAll(".cmp-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      filters.compareFilter = chip.dataset.cmp;
      document.querySelectorAll(".cmp-chip").forEach(c => c.classList.toggle("active", c === chip));
      applyFilters();
    });
  });
  compareOverlay.addEventListener("click", e => { if (e.target === compareOverlay) compareOverlay.hidden = true; });

  modalOverlay.addEventListener("click", e => { if (e.target === modalOverlay) closeModal(); });
  document.addEventListener("keydown", e => {
    if (e.key !== "Escape") return;
    if (!modalOverlay.hidden) closeModal();
    if (!compareOverlay.hidden) compareOverlay.hidden = true;
    closeMoreMenu();
  });

  // Pinch-to-Zoom unterbinden. iOS Safari ignoriert user-scalable=no,
  // reagiert aber auf gesturestart/touchmove mit scale.
  document.addEventListener("gesturestart", e => e.preventDefault());
  document.addEventListener("touchmove", e => {
    if (e.scale !== undefined && e.scale !== 1) e.preventDefault();
  }, { passive: false });

  // Zurück-nach-oben-Button
  const toTop = document.getElementById("to-top");
  window.addEventListener("scroll", () => { toTop.hidden = window.scrollY < 600; }, { passive: true });
  toTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

  // ===== Start =====
  applyView();
  renderCollectionSelect();
  loadCardmarketPrices();
  openLiveFromHash().then(handled => {
    if (!handled) switchCollection(activeId);
  });
})();
</script>
</body>
</html>
