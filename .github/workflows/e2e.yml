name: E2E (Chromium + WebKit)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Abhängigkeiten installieren
        run: npm install

      # WebKit braucht System-Bibliotheken – deshalb --with-deps. Chromium und
      # WebKit decken die beiden Engines ab, die für dieses Projekt zählen
      # (Chrome/Android und Safari/iOS).
      - name: Playwright-Browser installieren
        run: npx playwright install --with-deps chromium webkit

      - name: E2E-Tests
        run: npm test

      - name: Report bei Fehlschlag hochladen
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
