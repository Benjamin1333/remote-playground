name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # Täglich nach dem Cardmarket-Price-Guide-Update (erstellt ~02:45 MEZ)
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage site files
        run: |
          mkdir -p _site
          cp index.html _site/
      - name: Build Cardmarket prices
        run: python3 scripts/build_prices.py _site/prices.json
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
